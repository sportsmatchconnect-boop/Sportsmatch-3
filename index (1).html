<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportsMatch — Find Your Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:#0f172a;-webkit-font-smoothing:antialiased}
    .syne{font-family:'Syne',sans-serif}
    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    .up{animation:up .3s ease both}
    .fadein{animation:fadein .25s ease both}
    .spin{animation:spin .9s linear infinite}
    input:focus,textarea:focus{outline:none;border-color:#16a34a!important;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
    .card{background:white;border-radius:18px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.04)}
    .btn-primary{background:linear-gradient(135deg,#16a34a,#15803d);color:white;border:none;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
    .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.3)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .btn-ghost{background:none;border:1.5px solid #e2e8f0;color:#475569;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
    .btn-ghost:hover{border-color:#16a34a;color:#16a34a}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:600}
    .sport-btn{border:2px solid #e2e8f0;border-radius:12px;padding:.55rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer;background:white;transition:all .15s;display:flex;align-items:center;gap:6px}
    .sport-btn:hover,.sport-btn.on{border-color:#16a34a;background:#f0fdf4;color:#15803d}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s ease}
    .sheet{background:white;border-radius:24px 24px 0 0;padding:1.75rem 1.5rem 2.5rem;width:100%;max-width:480px;animation:up .28s ease;max-height:90vh;overflow-y:auto}
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-around;padding:.6rem 1rem .9rem;z-index:40}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:.3rem .6rem;border:none;background:none}
    .nav-label{font-size:.6rem;font-weight:600}
    .progress{height:4px;background:#e2e8f0;border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,#16a34a,#4ade80);border-radius:99px;transition:width .4s ease}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = 'https://vgwycjbmrswkagjddamp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnd3ljamJtcnN3a2FnamRkYW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDA5NTQsImV4cCI6MjA5MjkxNjk1NH0.GX3ff8a4wJameHWfjkn4VWeJL9bhJ-Hj9J3LP91tgqU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── SESSION ───────────────────────────────────────────────────
const S = {
  get: () => JSON.parse(localStorage.getItem('sm') || 'null'),
  set: u => localStorage.setItem('sm', JSON.stringify(u)),
  clear: () => localStorage.removeItem('sm'),
};

// ── CONSTANTS ─────────────────────────────────────────────────
const SPORTS = [
  {id:'soccer',e:'⚽',l:'Soccer'},
  {id:'basketball',e:'🏀',l:'Basketball'},
  {id:'tennis',e:'🎾',l:'Tennis'},
  {id:'volleyball',e:'🏐',l:'Volleyball'},
  {id:'pickleball',e:'🏓',l:'Pickleball'},
  {id:'ultimate',e:'🥏',l:'Ultimate'},
  {id:'running',e:'🏃',l:'Running'},
  {id:'golf',e:'⛳',l:'Golf'},
];

const SPORT_COLOR = {
  soccer:'#16a34a', basketball:'#f97316', tennis:'#f59e0b',
  volleyball:'#3b82f6', pickleball:'#ec4899', ultimate:'#8b5cf6',
  running:'#06b6d4', golf:'#10b981',
};

const COLORS = ['#16a34a','#2563eb','#7c3aed','#ea580c','#db2777','#0891b2'];

const fmtDate = ds => {
  const d = new Date(ds + 'T00:00:00'), today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
};

const sportInfo = id => SPORTS.find(s => s.id === id) || {e:'🏅', l: id};

// ── TINY COMPONENTS ───────────────────────────────────────────
const Spin = ({c='white',s=18}) => (
  <div style={{width:s,height:s,borderRadius:'50%',border:`2px solid ${c}33`,borderTopColor:c,flexShrink:0}} className="spin"/>
);

const Avatar = ({user, size=38}) => {
  const color = user?.avatar_color || '#16a34a';
  const initials = (user?.full_name || '?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:`linear-gradient(135deg,${color},${color}cc)`,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:size>40?'1rem':'.72rem',fontFamily:'Syne,sans-serif',flexShrink:0}}>
      {initials}
    </div>
  );
};

const Input = ({style={}, ...props}) => (
  <input style={{width:'100%',height:44,padding:'0 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',background:'white',fontFamily:'DM Sans,sans-serif',...style}} {...props}/>
);

const Label = ({children}) => (
  <p style={{fontSize:'.68rem',fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>{children}</p>
);

const Err = ({msg}) => msg ? (
  <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'10px 14px',color:'#ef4444',fontSize:'.8rem',lineHeight:1.5}}>{msg}</div>
) : null;

// ── SPORT PILL ────────────────────────────────────────────────
const SportPill = ({id}) => {
  const s = sportInfo(id);
  const c = SPORT_COLOR[id] || '#64748b';
  return (
    <span className="chip" style={{background:`${c}15`,color:c,border:`1px solid ${c}25`}}>
      {s.e} {s.l}
    </span>
  );
};

// ── GAME CARD ─────────────────────────────────────────────────
const GameCard = ({game, user, onJoin, idx=0}) => {
  const [busy, setBusy] = React.useState(false);
  const players = game.players || [];
  const joined = players.includes(user?.id);
  const isHost = game.host_id === user?.id;
  const spots = game.max_players - players.length;
  const full = spots <= 0;
  const pct = Math.round((players.length / game.max_players) * 100);
  const color = SPORT_COLOR[game.sport] || '#16a34a';
  const sport = sportInfo(game.sport);

  const toggle = async () => {
    if (!user || isHost || busy || (full && !joined)) return;
    setBusy(true);
    const np = joined ? players.filter(p => p !== user.id) : [...players, user.id];
    await sb.from('games').update({players: np}).eq('id', game.id);
    onJoin && onJoin();
    setBusy(false);
  };

  return (
    <div className="card up" style={{animationDelay:`${idx*60}ms`,overflow:'hidden'}}>
      <div style={{height:5,background:`linear-gradient(90deg,${color},${color}55)`}}/>
      <div style={{padding:'1rem'}}>
        {/* Top row */}
        <div style={{display:'flex',gap:12,marginBottom:12}}>
          <div style={{width:48,height:48,borderRadius:14,background:`${color}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem',flexShrink:0}}>
            {sport.e}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontWeight:700,fontSize:'.95rem',color:'#0f172a',lineHeight:1.3,marginBottom:3}}>{game.title}</p>
            <p style={{fontSize:'.75rem',color:'#94a3b8'}}>📍 {game.venue_name}</p>
          </div>
        </div>

        {/* Info row */}
        <div style={{display:'flex',gap:16,fontSize:'.75rem',color:'#64748b',marginBottom:12,flexWrap:'wrap'}}>
          <span>🗓 {fmtDate(game.date)}{game.time ? ` · ${game.time}` : ''}</span>
          <span>👥 {players.length}/{game.max_players} going</span>
          {game.host_name && <span>by {isHost ? 'you' : game.host_name}</span>}
        </div>

        {/* Spots bar */}
        <div style={{marginBottom:12}}>
          <div className="progress">
            <div className="progress-fill" style={{width:`${pct}%`,background:full?'#f87171':`linear-gradient(90deg,${color},${color}99)`}}/>
          </div>
          <p style={{fontSize:'.68rem',color:'#94a3b8',marginTop:4}}>
            {full ? 'Game is full' : `${spots} spot${spots===1?'':'s'} left`}
          </p>
        </div>

        {/* Players avatars if any */}
        {players.length > 0 && (
          <div style={{display:'flex',alignItems:'center',gap:-6,marginBottom:12}}>
            {players.slice(0,5).map((pid,i) => (
              <div key={pid} style={{width:24,height:24,borderRadius:'50%',background:COLORS[i%COLORS.length],border:'2px solid white',marginLeft:i>0?-8:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.6rem',fontWeight:700,color:'white',fontFamily:'Syne,sans-serif'}}>
                {i+1}
              </div>
            ))}
            <p style={{fontSize:'.72rem',color:'#94a3b8',marginLeft:8}}>{players.length} joined</p>
          </div>
        )}

        {/* Action */}
        {isHost ? (
          <div style={{padding:'9px',borderRadius:12,background:'#f0fdf4',border:'1.5px solid #86efac',textAlign:'center',fontSize:'.8rem',fontWeight:600,color:'#16a34a'}}>
            ✓ Your game
          </div>
        ) : (
          <button onClick={toggle} disabled={busy || (full && !joined)}
            className="btn-primary"
            style={{width:'100%',padding:'10px',borderRadius:12,fontSize:'.85rem',display:'flex',alignItems:'center',justifyContent:'center',gap:8,
              background: joined ? 'white' : full ? '#f1f5f9' : `linear-gradient(135deg,${color},${color}cc)`,
              color: joined ? '#16a34a' : full ? '#94a3b8' : 'white',
              border: joined ? '1.5px solid #86efac' : 'none',
            }}>
            {busy ? <Spin c={joined?'#16a34a':'white'}/> : joined ? '✓ You\'re in — tap to leave' : full ? 'Full' : `Join Game · ${spots} spot${spots===1?'':'s'} left`}
          </button>
        )}
      </div>
    </div>
  );
};

// ── AUTH SHEET ────────────────────────────────────────────────
const AuthSheet = ({mode:initMode, onAuth, onClose}) => {
  const [mode, setMode] = React.useState(initMode);
  const [f, setF] = React.useState({name:'',email:'',password:'',confirm:''});
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const set = (k,v) => { setF(p=>({...p,[k]:v})); setErr(''); };

  const signup = async () => {
    if (!f.name.trim()) return setErr('Name is required');
    if (!f.email.includes('@')) return setErr('Enter a valid email');
    if (f.password.length < 6) return setErr('Password must be at least 6 characters');
    if (f.password !== f.confirm) return setErr('Passwords do not match');
    setBusy(true);
    try {
      const {data:ex} = await sb.from('users').select('id').eq('email', f.email.trim().toLowerCase()).maybeSingle();
      if (ex) { setErr('Email already in use. Try signing in.'); setBusy(false); return; }
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      const {data, error} = await sb.from('users').insert({
        full_name: f.name.trim(),
        email: f.email.trim().toLowerCase(),
        password: f.password,
        avatar_color: color,
      }).select().single();
      if (error) throw error;
      const u = {...data}; delete u.password;
      S.set(u); onAuth(u);
    } catch(e) { setErr(e.message || 'Something went wrong. Try again.'); }
    setBusy(false);
  };

  const login = async () => {
    if (!f.email.trim() || !f.password) return setErr('Fill in all fields');
    setBusy(true);
    try {
      const {data, error} = await sb.from('users').select('*')
        .eq('email', f.email.trim().toLowerCase())
        .eq('password', f.password)
        .maybeSingle();
      if (error || !data) { setErr('Wrong email or password.'); setBusy(false); return; }
      const u = {...data}; delete u.password;
      S.set(u); onAuth(u);
    } catch(e) { setErr('Something went wrong. Try again.'); }
    setBusy(false);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,background:'#e2e8f0',borderRadius:99,margin:'0 auto 1.5rem'}}/>
        <p className="syne" style={{fontSize:'1.4rem',fontWeight:800,color:'#0f172a',marginBottom:4}}>
          {mode==='signup' ? 'Join SportsMatch' : 'Welcome back'}
        </p>
        <p style={{color:'#94a3b8',fontSize:'.82rem',marginBottom:'1.5rem'}}>
          {mode==='signup' ? 'Free forever. No credit card.' : 'Sign in to see and join games.'}
        </p>

        <div style={{display:'grid',gap:12}}>
          <Err msg={err}/>
          {mode==='signup' && (
            <div><Label>Your Name</Label><Input placeholder="e.g. Alex Johnson" value={f.name} onChange={e=>set('name',e.target.value)}/></div>
          )}
          <div><Label>Email</Label><Input type="email" placeholder="you@example.com" value={f.email} onChange={e=>set('email',e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='login'&&login()}/></div>
          <div><Label>Password</Label><Input type="password" placeholder={mode==='signup'?'At least 6 characters':'Your password'} value={f.password} onChange={e=>set('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='login'&&login()}/></div>
          {mode==='signup' && (
            <div><Label>Confirm Password</Label><Input type="password" placeholder="Same again" value={f.confirm} onChange={e=>set('confirm',e.target.value)} onKeyDown={e=>e.key==='Enter'&&signup()}/></div>
          )}
          <button onClick={mode==='signup'?signup:login} disabled={busy} className="btn-primary"
            style={{width:'100%',padding:'14px',borderRadius:13,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:4}}>
            {busy ? <Spin/> : mode==='signup' ? 'Create Account →' : 'Sign In →'}
          </button>
          <p style={{textAlign:'center',fontSize:'.78rem',color:'#94a3b8'}}>
            {mode==='signup'?'Have an account?':'New here?'}{' '}
            <button onClick={()=>{setMode(mode==='signup'?'login':'signup');setErr('');setF({name:'',email:'',password:'',confirm:''});}}
              style={{background:'none',border:'none',color:'#16a34a',fontWeight:600,cursor:'pointer',fontSize:'.78rem'}}>
              {mode==='signup'?'Sign in':'Create account'}
            </button>
          </p>
        </div>
      </div>
    </div>
  );
};

// ── CREATE GAME SHEET ─────────────────────────────────────────
const CreateSheet = ({user, onDone, onClose}) => {
  const [f, setF] = React.useState({title:'',sport:'',date:'',time:'',venue:'',max_players:8,notes:''});
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const set = (k,v) => { setF(p=>({...p,[k]:v})); setErr(''); };

  const submit = async () => {
    if (!f.title.trim()) return setErr('Give your game a title');
    if (!f.sport) return setErr('Pick a sport');
    if (!f.date) return setErr('Pick a date');
    if (!f.venue.trim()) return setErr('Add a location');
    setBusy(true);
    const {data, error} = await sb.from('games').insert({
      title: f.title.trim(),
      sport: f.sport,
      date: f.date,
      time: f.time,
      venue_name: f.venue.trim(),
      max_players: f.max_players,
      description: f.notes,
      players: [],
      host_id: user.id,
      host_name: user.full_name,
      status: 'open',
    }).select().single();
    setBusy(false);
    if (error) return setErr('Failed to create game. Try again.');
    onDone && onDone();
    onClose();
  };

  const today = new Date().toISOString().split('T')[0];

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div style={{width:36,height:4,background:'#e2e8f0',borderRadius:99,margin:'0 auto 1.25rem'}}/>
        <p className="syne" style={{fontSize:'1.3rem',fontWeight:800,color:'#0f172a',marginBottom:'1.25rem'}}>Create a Game</p>

        <div style={{display:'grid',gap:14}}>
          <Err msg={err}/>

          <div>
            <Label>Game Title</Label>
            <Input placeholder="e.g. Sunday Soccer at Elings Park" value={f.title} onChange={e=>set('title',e.target.value)}/>
          </div>

          <div>
            <Label>Sport</Label>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {SPORTS.map(s => (
                <button key={s.id} className={`sport-btn ${f.sport===s.id?'on':''}`} onClick={()=>set('sport',s.id)}>
                  <span>{s.e}</span><span>{s.l}</span>
                  {f.sport===s.id && <span style={{marginLeft:'auto',color:'#16a34a'}}>✓</span>}
                </button>
              ))}
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <Label>Date</Label>
              <Input type="date" min={today} value={f.date} onChange={e=>set('date',e.target.value)} style={{colorScheme:'light'}}/>
            </div>
            <div>
              <Label>Time</Label>
              <Input type="time" value={f.time} onChange={e=>set('time',e.target.value)} style={{colorScheme:'light'}}/>
            </div>
          </div>

          <div>
            <Label>Location / Venue</Label>
            <Input placeholder="e.g. Elings Park, Santa Barbara" value={f.venue} onChange={e=>set('venue',e.target.value)}/>
          </div>

          <div>
            <Label>Max Players: <span style={{color:'#16a34a',fontWeight:700}}>{f.max_players}</span></Label>
            <input type="range" min="2" max="30" value={f.max_players} onChange={e=>set('max_players',parseInt(e.target.value))}
              style={{width:'100%',accentColor:'#16a34a',marginTop:6}}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.68rem',color:'#94a3b8',marginTop:4}}>
              <span>2</span><span>30</span>
            </div>
          </div>

          <div>
            <Label>Notes (optional)</Label>
            <textarea value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="Bring pinnies, all levels welcome, etc..."
              rows={2} style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',resize:'none',fontFamily:'DM Sans,sans-serif'}}/>
          </div>

          <button onClick={submit} disabled={busy} className="btn-primary"
            style={{width:'100%',padding:'14px',borderRadius:13,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {busy ? <><Spin/>Creating...</> : 'Create Game ✓'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── FEED PAGE ─────────────────────────────────────────────────
const Feed = ({user, onLogout}) => {
  const [games, setGames] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [sport, setSport] = React.useState('all');
  const [creating, setCreating] = React.useState(false);
  const today = new Date().toISOString().split('T')[0];

  const load = async () => {
    const {data} = await sb.from('games').select('*').gte('date', today).order('date', {ascending:true});
    setGames(data || []);
    setLoading(false);
  };

  React.useEffect(() => { load(); }, []);

  const filtered = sport === 'all' ? games : games.filter(g => g.sport === sport);

  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'#f8fafc',paddingBottom:90}}>

      {/* Header */}
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.25rem 1.5rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <div>
            <p style={{color:'rgba(255,255,255,.6)',fontSize:'.78rem',fontWeight:500}}>
              {new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
            </p>
            <h1 className="syne" style={{color:'white',fontSize:'1.5rem',fontWeight:800,marginTop:2}}>
              Hey, {user.full_name.split(' ')[0]} 👋
            </h1>
          </div>
          <button onClick={onLogout} style={{background:'none',border:'none',cursor:'pointer'}}>
            <Avatar user={user} size={40}/>
          </button>
        </div>

        {/* Stats bar */}
        <div style={{background:'rgba(255,255,255,.08)',borderRadius:14,padding:'12px 16px',display:'flex',gap:24,border:'1px solid rgba(255,255,255,.1)'}}>
          <div style={{textAlign:'center'}}>
            <p className="syne" style={{color:'white',fontSize:'1.2rem',fontWeight:800}}>{games.length}</p>
            <p style={{color:'rgba(255,255,255,.55)',fontSize:'.65rem',fontWeight:500}}>Games up</p>
          </div>
          <div style={{width:1,background:'rgba(255,255,255,.1)'}}/>
          <div style={{textAlign:'center'}}>
            <p className="syne" style={{color:'white',fontSize:'1.2rem',fontWeight:800}}>
              {games.filter(g=>(g.players||[]).includes(user.id)).length}
            </p>
            <p style={{color:'rgba(255,255,255,.55)',fontSize:'.65rem',fontWeight:500}}>You're in</p>
          </div>
          <div style={{width:1,background:'rgba(255,255,255,.1)'}}/>
          <div style={{textAlign:'center'}}>
            <p className="syne" style={{color:'white',fontSize:'1.2rem',fontWeight:800}}>
              {games.reduce((a,g)=>(a+(g.players||[]).length),0)}
            </p>
            <p style={{color:'rgba(255,255,255,.55)',fontSize:'.65rem',fontWeight:500}}>Players</p>
          </div>
        </div>
      </div>

      {/* Sport filter */}
      <div style={{padding:'1rem 1.25rem .5rem',overflowX:'auto'}} className="scrollbar-hide">
        <div style={{display:'flex',gap:8,width:'max-content'}}>
          {['all',...SPORTS.map(s=>s.id)].map(s => {
            const info = SPORTS.find(x=>x.id===s);
            const active = sport===s;
            return (
              <button key={s} onClick={()=>setSport(s)}
                style={{padding:'6px 14px',borderRadius:99,fontSize:'.75rem',fontWeight:600,border:'none',cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s',
                  background: active ? '#16a34a' : 'white',
                  color: active ? 'white' : '#475569',
                  boxShadow: active ? '0 2px 8px rgba(22,163,74,.3)' : '0 1px 3px rgba(0,0,0,.06)',
                }}>
                {s==='all' ? 'All Sports' : `${info.e} ${info.l}`}
              </button>
            );
          })}
        </div>
      </div>

      {/* Game list */}
      <div style={{padding:'.75rem 1.25rem',display:'grid',gap:12}}>
        {loading && (
          <div style={{display:'flex',justifyContent:'center',padding:'3rem'}}>
            <Spin c='#16a34a' s={28}/>
          </div>
        )}
        {!loading && filtered.length === 0 && (
          <div className="card" style={{padding:'2.5rem',textAlign:'center'}}>
            <p style={{fontSize:'2.5rem',marginBottom:10}}>🏟️</p>
            <p className="syne" style={{fontWeight:700,color:'#0f172a',marginBottom:6}}>No games yet</p>
            <p style={{color:'#94a3b8',fontSize:'.85rem',marginBottom:'1.25rem'}}>Be the first to create one.</p>
            <button onClick={()=>setCreating(true)} className="btn-primary"
              style={{padding:'10px 24px',borderRadius:12,fontSize:'.85rem',fontFamily:'Syne,sans-serif',fontWeight:700}}>
              Create a Game
            </button>
          </div>
        )}
        {!loading && filtered.map((g,i) => (
          <GameCard key={g.id} game={g} user={user} onJoin={load} idx={i}/>
        ))}
      </div>

      {/* Bottom nav */}
      <div className="nav">
        <div style={{flex:1,textAlign:'center'}}>
          <p style={{fontSize:'1.3rem'}}>🏠</p>
          <p className="nav-label" style={{color:'#16a34a'}}>Games</p>
        </div>
        <button onClick={()=>setCreating(true)}
          style={{width:54,height:54,borderRadius:16,background:'linear-gradient(135deg,#16a34a,#15803d)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',marginTop:-16,boxShadow:'0 4px 16px rgba(22,163,74,.4)'}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <div style={{flex:1,textAlign:'center'}}>
          <p style={{fontSize:'1.3rem'}}>👤</p>
          <p className="nav-label" style={{color:'#94a3b8'}}>You</p>
        </div>
      </div>

      {creating && <CreateSheet user={user} onDone={load} onClose={()=>setCreating(false)}/>}
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────
const App = () => {
  const [user, setUser] = React.useState(() => S.get());
  const [authMode, setAuthMode] = React.useState(null);

  const handleAuth = u => { setUser(u); setAuthMode(null); };
  const handleLogout = () => { S.clear(); setUser(null); };

  if (user) return <Feed user={user} onLogout={handleLogout}/>;

  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
      <Landing onAuth={mode=>setAuthMode(mode)}/>
      {authMode && <AuthSheet mode={authMode} onAuth={handleAuth} onClose={()=>setAuthMode(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
