            <p style={{fontSize:'2.5rem',marginBottom:10}}>🔒</p>
            <p className="syne" style={{fontWeight:800,fontSize:'1.2rem',color:'#0f172a',marginBottom:6}}>Private game created!</p>
            <p style={{fontSize:'.82rem',color:'#64748b',marginBottom:'1.5rem'}}>Share this code or link with players you want to invite.</p>

          {/* PRIVATE GAME TOGGLE */}

const ProfilePage=({user,setUser,friends,onLogout,onMessage,onGameDeleted})=>{
  const [editing,setEditing]=React.useState(false);
  const [myGames,setMyGames]=React.useState([]);
  const [joinedGames,setJoinedGames]=React.useState([]);
  const [friendProfiles,setFriendProfiles]=React.useState([]);
  const [form,setForm]=React.useState({bio:user.bio||'',city:user.city||'',age:user.age||''});
  const [saving,setSaving]=React.useState(false);
  const [showAllGames,setShowAllGames]=React.useState(false);
  const [editingGame,setEditingGame]=React.useState(null);
  const [hostStats,setHostStats]=React.useState({total:0,streak:0,isTopHost:false,hasFirstGame:false});
  const [allMyGames,setAllMyGames]=React.useState([]);
  const [repeating,setRepeating]=React.useState(null);

  const repeatGame=async(g)=>{
    setRepeating(g.id);
    // Create new game with same details, no date/time set yet — open edit sheet
    const{data:newGame}=await sb.from('games').insert({
      title:g.title,sport:g.sport,venue_name:g.venue_name,address:g.address,
      city:g.city,max_players:g.max_players,description:g.description,
      players:[user.id],gear:{},host_id:user.id,host_name:user.full_name,
      status:'open',is_private:g.is_private,show_in_feed:g.show_in_feed,
      join_code:g.is_private?String(Math.floor(100000+Math.random()*900000)):null,
      date:new Date(Date.now()+7*24*60*60*1000).toISOString().split('T')[0], // default next week
    }).select().single();
    setRepeating(null);
    if(newGame)setEditingGame(newGame);
  };

  React.useEffect(()=>{
    const todayStr=localToday();
    sb.from('games').select('*').eq('host_id',user.id).gte('date',todayStr).order('date',{ascending:true}).then(({data})=>setMyGames(data||[]));
    // Past hosted games for repeat button
    sb.from('games').select('*').eq('host_id',user.id).lt('date',todayStr).order('date',{ascending:false}).limit(10).then(({data})=>setAllMyGames(data||[]));
    sb.from('games').select('*').contains('players',[user.id]).gte('date',todayStr).order('date',{ascending:true}).then(({data})=>setJoinedGames(data||[]));
    if(friends&&friends.length>0)sb.from('users').select('id,full_name,avatar_color,city,sports').in('id',friends).then(({data})=>setFriendProfiles(data||[]));
    // Load host stats for badges
    sb.from('games').select('date').eq('host_id',user.id).order('date',{ascending:false}).then(({data})=>{
      const all=data||[];
      const total=all.length;
      const hasFirstGame=total>=1;
      const isTopHost=total>=5;
      // Calculate consecutive week streak
      let streak=0;
      if(all.length>0){
        const weeks=new Set(all.map(g=>{
          const d=new Date(g.date+'T12:00:00');
          const jan1=new Date(d.getFullYear(),0,1);
          return `${d.getFullYear()}-${Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}`;
        }));
        const weekArr=[...weeks].sort().reverse();
        const nowWeek=(()=>{const d=new Date();const jan1=new Date(d.getFullYear(),0,1);return `${d.getFullYear()}-${Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}`;})();
        let cur=nowWeek;let s=0;
        for(const w of weekArr){if(w===cur){s++;const[yr,wk]=cur.split('-').map(Number);cur=wk>1?`${yr}-${wk-1}`:`${yr-1}-52`;}else break;}
        streak=s;
      }
      setHostStats({total,streak,isTopHost,hasFirstGame});
    });
  },[friends]);
  const save=async()=>{
    setSaving(true);
    const{data}=await sb.from('users').update(form).eq('id',user.id).select().single();

            <button onClick={onLogout} style={{padding:'6px 14px',borderRadius:99,background:'rgba(239,68,68,.2)',border:'1px solid rgba(239,68,68,.35)',color:'#fca5a5',fontSize:'.75rem',fontWeight:600,cursor:'pointer'}}>Sign out</button>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <Avatar user={user} size={64} ring/>
          <div>
            <h2 className="syne" style={{color:'white',fontSize:'1.1rem',fontWeight:800,marginBottom:4}}>{user.full_name}</h2>
            {user.city&&<p style={{color:'rgba(255,255,255,.65)',fontSize:'.78rem',marginBottom:4}}>📍 {user.city}</p>}
            {user.sports?.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}><SportPills sports={user.sports} max={4}/></div>}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:8}}>
              {hostStats.hasFirstGame&&<span style={{background:'rgba(255,255,255,.15)',color:'white',fontSize:'.65rem',fontWeight:700,padding:'3px 8px',borderRadius:99,border:'1px solid rgba(255,255,255,.25)'}}>🏆 First Game</span>}
              {hostStats.isTopHost&&<span style={{background:'rgba(251,191,36,.2)',color:'#fde68a',fontSize:'.65rem',fontWeight:700,padding:'3px 8px',borderRadius:99,border:'1px solid rgba(251,191,36,.3)'}}>⭐ Top Host</span>}
              {hostStats.streak>=2&&<span style={{background:'rgba(249,115,22,.2)',color:'#fed7aa',fontSize:'.65rem',fontWeight:700,padding:'3px 8px',borderRadius:99,border:'1px solid rgba(249,115,22,.3)'}}>🔥 {hostStats.streak} week streak</span>}

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[{l:'Age',v:user.age},{l:'Level',v:user.skill_level},{l:'Available',v:(user.availability||[]).slice(0,3).join(', ')}].filter(r=>r.v).map(r=>(
                  <div key={r.l} style={{background:'#f8fafc',borderRadius:10,padding:'8px 10px'}}><p style={{fontSize:'.62rem',color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>{r.l}</p><p style={{fontSize:'.8rem',fontWeight:600,color:'#0f172a'}}>{r.v}</p></div>
                ))}
              </div>
            </>
          ):(
            <div style={{display:'grid',gap:12}}>
              <div><Lbl>Bio</Lbl><textarea value={form.bio} onChange={e=>setForm(f=>({...f,bio:e.target.value}))} rows={3} style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',resize:'none',fontFamily:'DM Sans,sans-serif'}}/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><Lbl>City</Lbl><Inp value={form.city} onChange={e=>setForm(f=>({...f,city:e.target.value}))} placeholder="Santa Barbara"/></div>
                <div><Lbl>Age</Lbl><Inp type="number" value={form.age} onChange={e=>setForm(f=>({...f,age:e.target.value}))} placeholder="18"/></div>
              </div>
              <button onClick={save} disabled={saving} className="btn-green" style={{padding:'11px',borderRadius:12,fontSize:'.88rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>{saving?<><Spin/>Saving...</>:'Save Changes'}</button>
            </div>
          )}
        </div>
        <div className="card" style={{padding:'1rem'}}>
          <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>Stats</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            {[{l:'Created',v:myGames.length,c:'#16a34a'},{l:'Joined',v:joinedGames.length,c:'#2563eb'},{l:'Total',v:myGames.length+joinedGames.length,c:'#7c3aed'},{l:'Friends',v:(friends||[]).length,c:'#f97316'}].map(s=>(
              <div key={s.l} style={{background:'#f8fafc',borderRadius:12,padding:'10px 6px',textAlign:'center'}}><p className="syne" style={{fontSize:'1.3rem',fontWeight:800,color:s.c}}>{s.v}</p><p style={{fontSize:'.58rem',color:'#94a3b8',marginTop:3}}>{s.l}</p></div>
            ))}
          </div>
        </div>
        {friendProfiles.length>0&&(
          <div className="card" style={{padding:'1rem'}}>
            <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>Friends ({friendProfiles.length})</p>
            <div style={{display:'grid',gap:10}}>
              {friendProfiles.map(f=>(
                <div key={f.id} style={{display:'flex',alignItems:'center',gap:12}}>
                  <Avatar user={f} size={40}/>
                  <div style={{flex:1,minWidth:0}}><p style={{fontWeight:600,fontSize:'.85rem',color:'#0f172a'}}>{f.full_name}</p>{f.city&&<p style={{fontSize:'.7rem',color:'#94a3b8'}}>📍 {f.city}</p>}{f.sports?.length>0&&<div style={{marginTop:3}}><SportPills sports={f.sports} max={3}/></div>}</div>
                  <button onClick={()=>onMessage&&onMessage(f)} className="btn-ghost" style={{padding:'6px 12px',borderRadius:10,fontSize:'.72rem',flexShrink:0}}>Message</button>
                </div>
              ))}
            </div>
          </div>
        )}
        {myGames.length>0&&(
          <div className="card" style={{padding:'1rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a'}}>Games You Created</p>
              {myGames.length>3&&<button onClick={()=>setShowAllGames(s=>!s)} style={{background:'none',border:'none',color:'#16a34a',fontSize:'.75rem',fontWeight:600,cursor:'pointer'}}>{showAllGames?'Show less':'See all'} ({myGames.length})</button>}
            </div>
            <div style={{maxHeight:showAllGames?'400px':'none',overflowY:showAllGames?'auto':'visible'}}>
            {(showAllGames?myGames:myGames.slice(0,3)).map(g=>(
              <div key={g.id} style={{padding:'8px 0',borderBottom:'1px solid #f8fafc'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:g.is_private&&g.join_code?6:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:'1.1rem'}}>{sportInfo(g.sport).e}</span><div><p style={{fontWeight:600,fontSize:'.82rem',color:'#0f172a'}}>{g.title}{g.is_private?' 🔒':''}</p><p style={{fontSize:'.7rem',color:'#94a3b8'}}>{fmtDate(g.date)}</p></div></div>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:'.72rem',color:'#16a34a',fontWeight:600}}>{(g.players||[]).length}/{g.max_players}</span>
                    <button onClick={()=>setEditingGame(g)} style={{padding:'3px 8px',borderRadius:6,border:'1px solid #bfdbfe',background:'white',color:'#2563eb',fontSize:'.65rem',fontWeight:600,cursor:'pointer'}}>Edit</button>
                    <button onClick={async()=>{if(window.confirm('Delete this game? This cannot be undone.')){await sb.from('games').delete().eq('id',g.id).eq('host_id',user.id);setMyGames(m=>m.filter(x=>x.id!==g.id));onGameDeleted&&onGameDeleted(g.id);}}} style={{padding:'3px 8px',borderRadius:6,border:'1px solid #fecaca',background:'white',color:'#ef4444',fontSize:'.65rem',fontWeight:600,cursor:'pointer'}}>Delete</button>
                  </div>
                </div>
                {g.is_private&&g.join_code&&(
                  <div style={{display:'flex',alignItems:'center',gap:8,background:'#f8fafc',borderRadius:10,padding:'7px 10px'}}>
                    <span style={{fontSize:'.7rem',color:'#94a3b8',fontWeight:500}}>Code:</span>
                    <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:'.9rem',letterSpacing:'.1em',color:'#0f172a',flex:1}}>{g.join_code}</span>
                    <ProfileShareBtn game={g} link={`${appBaseUrl()}?join=${g.join_code}`}/>
                  </div>
                )}
                {!g.is_private&&(
                  <div style={{display:'flex',alignItems:'center',gap:8,background:'#f8fafc',borderRadius:10,padding:'7px 10px',marginTop:4}}>
                    <span style={{fontSize:'.7rem',color:'#94a3b8',fontWeight:500,flex:1}}>Public game — invite anyone</span>
                    <ProfileShareBtn game={g} link={`${appBaseUrl()}?game=${g.id}`}/>
                  </div>
                )}
              </div>
            ))}
            </div>
          </div>
        )}
      </div>
    {allMyGames.length>0&&(
        <div className="card" style={{padding:'1rem'}}>
          <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>Past Games — Host Again</p>
          <div style={{display:'grid',gap:10}}>
            {allMyGames.slice(0,5).map(g=>(
              <div key={g.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid #f8fafc'}}>
                <span style={{fontSize:'1.1rem'}}>{sportInfo(g.sport).e}</span>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:600,fontSize:'.82rem',color:'#0f172a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{g.title}</p>
                  <p style={{fontSize:'.7rem',color:'#94a3b8'}}>{fmtDate(g.date)} · {g.venue_name||g.city}</p>
                </div>
                <button onClick={()=>repeatGame(g)} disabled={repeating===g.id}
                  style={{padding:'5px 12px',borderRadius:8,border:'none',background:'#f0fdf4',color:'#16a34a',fontSize:'.72rem',fontWeight:700,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',gap:4}}>
                  {repeating===g.id?<Spin s={12} c='#16a34a'/>:<>🔁 Repeat</>}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    {editingGame&&<EditGameSheet game={editingGame} user={user}
        onDone={()=>{
          const todayStr=localToday();
          sb.from('games').select('*').eq('host_id',user.id).gte('date',todayStr).order('date',{ascending:true}).then(({data})=>setMyGames(data||[]));
          sb.from('games').select('*').eq('host_id',user.id).lt('date',todayStr).order('date',{ascending:false}).limit(10).then(({data})=>setAllMyGames(data||[]));
        }}
        onClose={()=>setEditingGame(null)}/>}
    </div>
  );
};

// ── FEED ──────────────────────────────────────────────────────
const Feed=({user,setUser,pendingGame})=>{
  const [games,setGames]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [sport,setSport]=React.useState('all');
  const [creating,setCreating]=React.useState(false);
  const [detail,setDetail]=React.useState(pendingGame||null);
  const [tab,setTab]=React.useState('feed');
  const [showFirstGamePopup,setShowFirstGamePopup]=React.useState(false);
  const [showSpreadPopup,setShowSpreadPopup]=React.useState(false);
  const [spreadCopied,setSpreadCopied]=React.useState(false);
  const [showInbox,setShowInbox]=React.useState(false);
  const [showDiscover,setShowDiscover]=React.useState(false);
  const [showJoinPrivate,setShowJoinPrivate]=React.useState(false);
  const [friends,setFriends]=React.useState(user.friends||[]);
  const [inboxCount,setInboxCount]=React.useState(0);
  const [chatWith,setChatWith]=React.useState(null);
  const [privateGames,setPrivateGames]=React.useState([]);
  const [privateDetail,setPrivateDetail]=React.useState(null);
  const [copiedCode,setCopiedCode]=React.useState(null);
  const [confirmDelete,setConfirmDelete]=React.useState(null);
  const today=localToday();
  const hour=new Date().getHours();
  const greeting=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';
  const [totalUsers,setTotalUsers]=React.useState(0);
  const [showWeekendBanner,setShowWeekendBanner]=React.useState(false);

  const load=async()=>{
    const{data}=await sb.from('games').select('*').gte('date',today).or('is_private.is.null,is_private.eq.false,show_in_feed.eq.true').order('date',{ascending:true});
    setGames(data||[]);setLoading(false);
    // Weekend banner: show if no games in next 3 days
    const in3=new Date();in3.setDate(in3.getDate()+3);
    const in3str=in3.toISOString().split('T')[0];
    const upcoming=(data||[]).filter(g=>g.date>=today&&g.date<=in3str);
    setShowWeekendBanner(upcoming.length===0);
  };
  const loadTotalUsers=async()=>{
    const{count}=await sb.from('users').select('*',{count:'exact',head:true});
    setTotalUsers(count||0);
  };
  const loadFriends=async()=>{
    const{data}=await sb.from('users').select('friends').eq('id',user.id).single();
    if(data){
      // friends may come back as string or array depending on jsonb handling
      let f=data.friends;
      if(typeof f==='string'){try{f=JSON.parse(f);}catch(e){f=[];}}
      if(!Array.isArray(f))f=[];
      if(f.length!==friends.length||f.some((id,i)=>id!==friends[i])){
        setFriends(f);
        const u={...user,friends:f};setUser(u);S.set(u);
      }
    }
  };
  const loadPrivateGames=async()=>{
    const tdy=localToday();
    const{data}=await sb.from('games').select('*').eq('host_id',user.id).eq('is_private',true).eq('show_in_feed',false).gte('date',tdy);
    setPrivateGames(data||[]);
  };
  const deleteGame=async(gameId)=>{
    await sb.from('games').delete().eq('id',gameId).eq('host_id',user.id);
    // Instantly remove from privateGames state so pill disappears immediately
    setPrivateGames(prev=>prev.filter(g=>g.id!==gameId));
    setConfirmDelete(null);setDetail(null);setPrivateDetail(null);
    load();loadPrivateGames();
  };
  const loadInboxCount=async()=>{
    const[{count:fc},{data:myGamesData}]=await Promise.all([
      sb.from('friend_requests').select('*',{count:'exact',head:true}).eq('to_id',user.id).eq('status','pending'),
      sb.from('games').select('id').eq('host_id',user.id),
    ]);
    const myGameIds=(myGamesData||[]).map(g=>g.id);
    let jc=0;
    if(myGameIds.length>0){
      const{count}=await sb.from('join_requests').select('*',{count:'exact',head:true}).eq('status','pending').in('game_id',myGameIds);
      jc=count||0;
    }
    setInboxCount((fc||0)+jc);
  };
  React.useEffect(()=>{
    load();loadPrivateGames();loadInboxCount();loadFriends();loadTotalUsers();
    // Show spread the word popup once per day
    const lastSeen=localStorage.getItem('sm_spread_seen');
    const todayKey=localToday();
    if(lastSeen!==todayKey)setShowSpreadPopup(true);
    // Show "create your first game" popup if they have never created one and haven't dismissed it
    const dismissed=localStorage.getItem('sm_first_game_dismissed');
    if(!dismissed){
      sb.from('games').select('id',{count:'exact',head:true}).eq('host_id',user.id).then(({count})=>{
        if((count||0)===0)setShowFirstGamePopup(true);
      });
    }
  },[]);

  // Check URL for shareable link — supports both ?join=CODE (private) and ?game=ID (public)
  React.useEffect(()=>{
    // Check both URL params and sessionStorage (for users who had to log in first)
    const params=new URLSearchParams(window.location.search);
    const joinCode=params.get('join')||sessionStorage.getItem('sm_pending_join');
    const gameId=params.get('game')||sessionStorage.getItem('sm_pending_game');
    if(joinCode){
      sessionStorage.removeItem('sm_pending_join');
      sb.from('games').select('*').eq('join_code',joinCode).maybeSingle().then(({data})=>{
        if(data)setDetail(data);
      });
    } else if(gameId){
      sessionStorage.removeItem('sm_pending_game');
      sb.from('games').select('*').eq('id',gameId).maybeSingle().then(({data})=>{
        if(data)setDetail(data);
      });
    }
  },[]);

  const handleLogout=()=>{S.clear();window.location.reload();};
  const filtered=sport==='all'?games:games.filter(g=>g.sport===sport);
  const myCount=games.filter(g=>(g.players||[]).includes(user.id)||g.host_id===user.id).length;
  const updateFriends=f=>{setFriends(f);const u={...user,friends:f};setUser(u);S.set(u);};

  const NavBar=({active})=>(
    <div className="nav" style={{padding:'.45rem .1rem .85rem'}}>
      <button className="nav-item" style={{padding:'.25rem .3rem'}} onClick={()=>setTab('feed')}>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={active==='feed'?'#16a34a':'#94a3b8'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span className="nav-label" style={{color:active==='feed'?'#16a34a':'#94a3b8',fontSize:'.52rem'}}>Games</span>
      </button>
      <button className="nav-item" style={{padding:'.25rem .3rem'}} onClick={()=>setShowDiscover(true)}>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke='#94a3b8' strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span className="nav-label" style={{color:'#94a3b8',fontSize:'.52rem'}}>Find</span>
      </button>
      <button onClick={()=>setCreating(true)} style={{width:46,height:46,borderRadius:14,background:'linear-gradient(135deg,#16a34a,#15803d)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',marginTop:-12,boxShadow:'0 4px 16px rgba(22,163,74,.4)',flexShrink:0}}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button className="nav-item" style={{padding:'.25rem .3rem'}} onClick={()=>{setShowInbox(true);setInboxCount(0);}}>
        <div style={{position:'relative'}}>
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke='#94a3b8' strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          {inboxCount>0&&<div className="badge">{inboxCount}</div>}
        </div>
        <span className="nav-label" style={{color:'#94a3b8',fontSize:'.52rem'}}>Inbox</span>
      </button>
      <button className="nav-item" style={{padding:'.25rem .3rem'}} onClick={()=>setTab('archive')}>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={active==='archive'?'#16a34a':'#94a3b8'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span className="nav-label" style={{color:active==='archive'?'#16a34a':'#94a3b8',fontSize:'.52rem'}}>Archive</span>
      </button>
      <button className="nav-item" style={{padding:'.25rem .3rem'}} onClick={()=>setTab('profile')}>
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke={active==='profile'?'#16a34a':'#94a3b8'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span className="nav-label" style={{color:active==='profile'?'#16a34a':'#94a3b8',fontSize:'.52rem'}}>Profile</span>
      </button>
    </div>
  );

  if(tab==='profile')return(
    <div style={{maxWidth:480,margin:'0 auto',overflowX:'hidden'}}>
      <ProfilePage user={user} setUser={setUser} friends={friends} onLogout={handleLogout} onMessage={p=>setChatWith(p)} onGameDeleted={id=>{setPrivateGames(prev=>prev.filter(g=>g.id!==id));loadPrivateGames();}}/>
      <NavBar active="profile"/>
      {privateGames.length>0&&privateGames.map(pg=>(
        <div key={pg.id} className="private-float" style={{maxWidth:640,left:'calc(260px + 1rem)',transform:'none',width:'calc(100% - 260px - 3rem)'}}
          onClick={()=>setDetail(pg)}>
          <span style={{fontSize:'1.2rem'}}>🔒</span>
          <div style={{flex:1,minWidth:0}}>
            <p style={{color:'white',fontWeight:700,fontSize:'.82rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{pg.title}</p>
            <p style={{color:'rgba(255,255,255,.55)',fontSize:'.7rem'}}>{fmtDate(pg.date)}{pg.time?` · ${fmtTime(pg.time)}`:''} · {(pg.players||[]).length}/{pg.max_players} players</p>
          </div>
          <button onClick={e=>{e.stopPropagation();const link=`${appBaseUrl()}?join=${pg.join_code}`;copyToClipboard(link);setCopiedCode(pg.id);setTimeout(()=>setCopiedCode(null),2000);}}
            style={{padding:'6px 12px',borderRadius:8,border:'none',background:'rgba(255,255,255,.15)',color:'white',fontSize:'.72rem',fontWeight:600,cursor:'pointer',flexShrink:0}}>
            {copiedCode===pg.id?'✓ Copied':'Copy link'}
          </button>
        </div>
      ))}
      {creating&&<CreateSheet user={user} onDone={()=>{load();loadPrivateGamesDesktop();}} onClose={()=>setCreating(false)}/>}
      {chatWith&&<PrivateChat user={user} otherUser={chatWith} onClose={()=>setChatWith(null)}/>}
    </div>
  );

  if(tab==='archive')return(
    <div style={{maxWidth:480,margin:'0 auto',overflowX:'hidden'}}>
      <ArchivePage user={user}/>
      <NavBar active="archive"/>
    </div>
  );

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'#f8fafc',paddingBottom:90,overflowX:'hidden'}}>
      {/* MOBILE HEADER — cleaner version */}
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.25rem 1.25rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <div>
            <p style={{color:'rgba(255,255,255,.55)',fontSize:'.75rem',fontWeight:500}}>{greeting}</p>
            <h1 className="syne" style={{color:'white',fontSize:'1.4rem',fontWeight:800,marginTop:2}}>{user.full_name.split(' ')[0]} 👋</h1>
          </div>
          <button onClick={()=>setTab('profile')} style={{background:'none',border:'none',cursor:'pointer'}}><Avatar user={user} size={42} ring/></button>
        </div>
        {/* Clean stat strip */}
        <div style={{display:'flex',gap:0,background:'rgba(255,255,255,.08)',borderRadius:14,padding:'10px 0',border:'1px solid rgba(255,255,255,.1)'}}>
          {[{v:games.length,l:'Games'},{v:myCount,l:'Joined'},{v:totalUsers,l:'Members'}].map((s,i)=>(
            <React.Fragment key={s.l}>
              {i>0&&<div style={{width:1,background:'rgba(255,255,255,.15)'}}/>}
              <div style={{textAlign:'center',flex:1,padding:'2px 0'}}>
                <p className="syne" style={{color:'white',fontSize:'1.1rem',fontWeight:800}}>{s.v}</p>
                <p style={{color:'rgba(255,255,255,.5)',fontSize:'.62rem',fontWeight:500,marginTop:1}}>{s.l}</p>
              </div>
            </React.Fragment>
          ))}
        </div>
      </div>

      {/* Join private game button */}
      <div style={{padding:'10px 1.25rem 0',display:'flex',justifyContent:'flex-end'}}>
        <button onClick={()=>setShowJoinPrivate(true)} style={{padding:'6px 14px',borderRadius:99,background:'white',border:'1.5px solid #e2e8f0',fontSize:'.75rem',fontWeight:600,color:'#475569',cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>🔑 Join private game</button>
      </div>

      {/* Sport filter */}

const ADMIN_USER_ID='af18c523-214d-49db-b9e4-4d76951dbe17';
const DesktopArchive=({user})=>{
  // Same layout as mobile ArchivePage — dark bg, carousel, Find my game
  const [games,setGames]=React.useState([]);
  const [myGames,setMyGames]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [myGamesLoading,setMyGamesLoading]=React.useState(false);
  const [selectedGame,setSelectedGame]=React.useState(null);
  const [showMyGames,setShowMyGames]=React.useState(false);
  const today=localToday();
  const carouselRef=React.useRef(null);

  const loadArchive=async()=>{
    const isAdmin=user.id===ADMIN_USER_ID;
    const{data:photoGames}=await sb.from('game_photos').select('game_id,is_public');
    const counts={};
    (photoGames||[]).filter(p=>p.is_public).forEach(p=>{counts[p.game_id]=(counts[p.game_id]||0)+1;});
    if(isAdmin){
      const{data}=await sb.from('games').select('*').lt('date',today).order('date',{ascending:false});
      setGames((data||[]).map(g=>({...g,photoCount:counts[g.id]||0})));
    } else {
      const gameIds=[...new Set((photoGames||[]).filter(p=>p.is_public).map(p=>p.game_id))];
      if(gameIds.length===0){setLoading(false);return;}
      const{data}=await sb.from('games').select('*').in('id',gameIds).lt('date',today).order('date',{ascending:false});
      setGames((data||[]).map(g=>({...g,photoCount:counts[g.id]||0})));
    }
    setLoading(false);
  };

  const loadMyGames=async()=>{
    setMyGamesLoading(true);
    const{data:photoGames}=await sb.from('game_photos').select('game_id,is_public');
    const counts={};
    (photoGames||[]).filter(p=>p.is_public).forEach(p=>{counts[p.game_id]=(counts[p.game_id]||0)+1;});
    const[{data:hosted},{data:played}]=await Promise.all([
      sb.from('games').select('*').eq('host_id',user.id).lt('date',today).order('date',{ascending:false}),
      sb.from('games').select('*').contains('players',[user.id]).lt('date',today).order('date',{ascending:false}),
    ]);
    const seen=new Set();
    const data=[...(hosted||[]),...(played||[])].filter(g=>{
      if(seen.has(g.id))return false;seen.add(g.id);return true;
    }).sort((a,b)=>b.date.localeCompare(a.date));
    setMyGames(data.map(g=>({...g,photoCount:counts[g.id]||0})));
    setMyGamesLoading(false);
  };

  React.useEffect(()=>{loadArchive();},[]);
  React.useEffect(()=>{if(showMyGames&&myGames.length===0)loadMyGames();},[showMyGames]);

  // Auto-scroll carousel
  React.useEffect(()=>{
    if(!carouselRef.current||games.length===0)return;
    let pos=0;let dir=1;
    const el=carouselRef.current;
    const tick=setInterval(()=>{
      if(el._paused)return;
      pos+=0.5*dir;
      if(pos>=el.scrollWidth-el.clientWidth-2){dir=-1;}
      if(pos<=0){dir=1;}
      el.scrollLeft=pos;
    },16);
    return()=>clearInterval(tick);
  },[games.length]);

  return(
    <div style={{background:'#0f172a',borderRadius:20,minHeight:'80vh',padding:'1.5rem',marginBottom:40}}>
      <div style={{marginBottom:'1.25rem'}}>
        <h1 className="syne" style={{fontSize:'1.4rem',fontWeight:800,color:'white',marginBottom:4}}>Photo Archive 📸</h1>
        <p style={{color:'rgba(255,255,255,.45)',fontSize:'.82rem'}}>Game memories from across SportsMatch</p>
      </div>

      {/* Horizontal carousel */}
      {!loading&&games.length>0&&(
        <div style={{marginBottom:16}}>
          <p style={{color:'rgba(255,255,255,.4)',fontSize:'.68rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Recent memories</p>
          <div ref={carouselRef}
            onMouseEnter={()=>{if(carouselRef.current)carouselRef.current._paused=true;}}
            onMouseLeave={()=>{if(carouselRef.current)carouselRef.current._paused=false;}}
            style={{display:'flex',gap:12,overflowX:'auto',paddingBottom:12,scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}}>
            {games.slice(0,10).map(g=>(
              <ArchiveCard key={g.id} g={g} onClick={()=>setSelectedGame(g)} width="240px"/>
            ))}
          </div>
        </div>
      )}

      {/* Find my game button */}
      <div style={{marginBottom:16}}>
        <button onClick={()=>setShowMyGames(!showMyGames)}
          style={{width:'100%',padding:'14px',borderRadius:14,border:'1.5px solid rgba(255,255,255,.15)',background:showMyGames?'rgba(255,255,255,.12)':'rgba(255,255,255,.06)',color:'white',fontSize:'.9rem',fontWeight:700,fontFamily:'Syne,sans-serif',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          📂 {showMyGames?'Hide my games':'Find my game — add photos'}
        </button>
      </div>

      {/* My games list */}
      {showMyGames&&(
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
          <p style={{color:'rgba(255,255,255,.4)',fontSize:'.72rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Your past games</p>
          {myGamesLoading&&<div style={{display:'flex',justifyContent:'center',padding:'2rem'}}><Spin c='#4ade80' s={24}/></div>}
          {!myGamesLoading&&myGames.length===0&&(
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.85rem',textAlign:'center',padding:'1.5rem'}}>No past games found.</p>
          )}
          {!myGamesLoading&&myGames.map(g=>(
            <ArchiveCard key={g.id} g={g} onClick={()=>setSelectedGame(g)}/>
          ))}
        </div>
      )}

      {/* Main reel */}
      <div style={{display:'flex',flexDirection:'column',gap:14}}>
        {loading&&<div style={{display:'flex',justifyContent:'center',padding:'3rem'}}><Spin c='#4ade80' s={28}/></div>}
        {!loading&&games.length===0&&!showMyGames&&(
          <div style={{textAlign:'center',padding:'3rem 1rem'}}>
            <p style={{fontSize:'3rem',marginBottom:12}}>📷</p>
            <p style={{color:'white',fontWeight:700,fontSize:'1.1rem',fontFamily:'Syne,sans-serif',marginBottom:8}}>No photos yet</p>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.85rem',lineHeight:1.6}}>Once games end, players can add photos. They will appear here.</p>
          </div>
        )}
        {!loading&&games.length>0&&(
          <>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.68rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>All photos</p>
            {games.map(g=>(
              <ArchiveCard key={g.id} g={g} onClick={()=>setSelectedGame(g)}/>
            ))}
          </>
        )}
      </div>
      {selectedGame&&<PhotoGallery game={selectedGame} user={user} onClose={()=>setSelectedGame(null)}/>}
    </div>
  );
};

const DesktopApp=({user,setUser,onLogout,pendingGame})=>{
  const [games,setGames]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [sport,setSport]=React.useState('all');
  const [creating,setCreating]=React.useState(false);
  const [detail,setDetail]=React.useState(pendingGame||null);
  const [activeNav,setActiveNav]=React.useState('games');
  const [showDiscover,setShowDiscover]=React.useState(false);
  const [showInbox,setShowInbox]=React.useState(false);
  const [showJoinPrivate,setShowJoinPrivate]=React.useState(false);
  const [friends,setFriends]=React.useState(user.friends||[]);
  const [inboxCount,setInboxCount]=React.useState(0);
  const [nearbyCount,setNearbyCount]=React.useState(0);
  const [totalUsers,setTotalUsers]=React.useState(0);
  const [chatWith,setChatWith]=React.useState(null);

  const [privateGames,setPrivateGames]=React.useState([]);

  const today=localToday();
  const hour=new Date().getHours();
  const greeting=hour<12?'Good morning':hour<17?'Good afternoon':'Good evening';

  const load=async()=>{
    const{data}=await sb.from('games').select('*').gte('date',today).or('is_private.is.null,is_private.eq.false,show_in_feed.eq.true').order('date',{ascending:true});
    setGames(data||[]);setLoading(false);
  };
  const loadPrivateGamesDesktop=async()=>{
    const{data}=await sb.from('games').select('*').eq('host_id',user.id).eq('is_private',true).gte('date',today).order('date',{ascending:true});
    setPrivateGames(data||[]);
  };
  const deleteGame=async(gameId)=>{
    await sb.from('games').delete().eq('id',gameId).eq('host_id',user.id);
    setConfirmDelete(null);setDetail(null);load();
  };
  const loadInboxCount=async()=>{
    const[{count:fc},{data:myGamesData}]=await Promise.all([
      sb.from('friend_requests').select('*',{count:'exact',head:true}).eq('to_id',user.id).eq('status','pending'),
      sb.from('games').select('id').eq('host_id',user.id),
    ]);
    const myGameIds=(myGamesData||[]).map(g=>g.id);
    let jc=0;
    if(myGameIds.length>0){
      const{count}=await sb.from('join_requests').select('*',{count:'exact',head:true}).eq('status','pending').in('game_id',myGameIds);
      jc=count||0;
    }
    setInboxCount((fc||0)+jc);
  };
  const loadNearby=async()=>{
    if(!user.city)return;
    const{count}=await sb.from('users').select('*',{count:'exact',head:true}).ilike('city',user.city.trim()).neq('id',user.id);
    setNearbyCount(count||0);
  };
  const loadTotalUsersDesktop=async()=>{
    const{count}=await sb.from('users').select('*',{count:'exact',head:true});
    setTotalUsers(count||0);
  };
  const loadFriendsDesktop=async()=>{
    const{data}=await sb.from('users').select('friends').eq('id',user.id).single();
    if(data){
      let f=data.friends;
      if(typeof f==='string'){try{f=JSON.parse(f);}catch(e){f=[];}}
      if(!Array.isArray(f))f=[];
      setFriends(f);
      const u={...user,friends:f};setUser(u);S.set(u);
    }
  };
  React.useEffect(()=>{load();loadInboxCount();loadNearby();loadTotalUsersDesktop();loadFriendsDesktop();loadPrivateGamesDesktop();},[]);

  const filtered=sport==='all'?games:games.filter(g=>g.sport===sport);
  const myGames=games.filter(g=>(g.players||[]).includes(user.id)||g.host_id===user.id);
  const todayGames=games.filter(g=>g.date===today);
  const updateFriends=f=>{setFriends(f);const u={...user,friends:f};setUser(u);S.set(u);};

  const navItems=[
    {id:'games',icon:'🏠',label:'Games'},
    {id:'discover',icon:'🔍',label:'Find Players'},
    {id:'inbox',icon:'📬',label:`Inbox${inboxCount>0?` (${inboxCount})`:''}` },
    {id:'archive',icon:'📸',label:'Archive'},
    {id:'profile',icon:'👤',label:'Profile'},
  ];
  const handleNav=(id)=>{
    if(id==='discover'){setShowDiscover(true);return;}
    if(id==='inbox'){setShowInbox(true);setInboxCount(0);return;}
    setActiveNav(id);
  };

  return(
    <div style={{display:'flex',minHeight:'100vh',background:'#f0fdf4'}}>
      {/* SIDEBAR */}
      <div style={{width:260,flexShrink:0,background:'linear-gradient(160deg,#052e16,#14532d)',padding:'2rem 1.25rem',display:'flex',flexDirection:'column',position:'fixed',top:0,left:0,height:'100vh',zIndex:10,overflowY:'auto'}}>

          <span className="syne" style={{color:'white',fontSize:'1.5rem',fontWeight:800}}>Sports<span style={{color:'#4ade80'}}>Match</span></span>

// ── HEALTH CHECK (silent self-healing, runs every 3 min) ─────
const useHealthCheck=(user,setUser)=>{
  React.useEffect(()=>{
    if(!user?.id)return;
    const check=async()=>{
      try{
        // 1. Re-fetch user from DB and sync localStorage
        const{data:fresh}=await sb.from('users').select('id,full_name,email,city,bio,age,sports,skill_level,friends,avatar_color,onboarded,tos_accepted_at').eq('id',user.id).single();
        if(!fresh)return;
        const u={...fresh};delete u.password;
        // Fix: if friends array is null/undefined, set to []
        if(!u.friends)u.friends=[];
        // Fix: if onboarded is null but has data, mark as onboarded
        if(!u.onboarded&&(u.city||u.bio||(u.sports&&u.sports.length)))u.onboarded=true;
        S.set(u);
        // Only trigger re-render if something meaningful changed
        if(JSON.stringify(u.friends)!==JSON.stringify(user.friends)||u.onboarded!==user.onboarded){
          setUser(u);
        }
        // 2. Check for games that ended yesterday or a week ago — notify host to repeat
        const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
        const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
        const yStr=yesterday.toISOString().split('T')[0];
        const wStr=weekAgo.toISOString().split('T')[0];
        const{data:repeatGames}=await sb.from('games').select('id,title,sport,date').eq('host_id',user.id).in('date',[yStr,wStr]);
        for(const rg of (repeatGames||[])){
          const notifKey=`sm_repeat_notif_${rg.id}_${rg.date}`;
          if(!localStorage.getItem(notifKey)){
            const dayLabel=rg.date===yStr?'yesterday':'last week';
            await sb.from('notifications').insert({
              type:'repeat_game',
              recipient_emails:[user.email],
              game_id:rg.id,
              subject:`How did ${rg.title} go? Host it again!`,
              body:`Your ${rg.sport} game "${rg.title}" was ${dayLabel}. Players loved it — host it again with one tap on your profile.`,
              status:'pending',
            }).then(()=>{}).catch(()=>{});
            localStorage.setItem(notifKey,'1');
          }
        }

        // 3. Scan for corrupted games and ensure host is in players
        const today=localToday();
        const{data:myGames}=await sb.from('games').select('id,players,gear,host_id').eq('host_id',user.id).gte('date',today);
        for(const g of(myGames||[])){
          if(!Array.isArray(g.players)){
            // Fix: corrupted players array
            await sb.from('games').update({players:[user.id],gear:g.gear||{}}).eq('id',g.id);
            console.log('[HealthCheck] Fixed corrupted players array on game',g.id);
          } else if(!g.players.includes(user.id)){
            // Fix: host not in players array
            await sb.from('games').update({players:[user.id,...g.players]}).eq('id',g.id);
            console.log('[HealthCheck] Added host to players on game',g.id);
          }
        }
      }catch(e){
        // Silent fail — health check should never crash the app
        console.log('[HealthCheck] check skipped:',e.message);
      }
    };
    check(); // run once on mount
    const interval=setInterval(check,3*60*1000); // then every 3 min
    return()=>clearInterval(interval);
  },[user?.id]);
};

// ── GUEST FEED (router) ───────────────────────────────────────
const GuestFeed=({onAuth})=>{
  if(window.innerWidth>=768)return<GuestFeedDesktop onAuth={onAuth}/>;
  return<GuestFeedMobile onAuth={onAuth}/>;
};

// ── APP ───────────────────────────────────────────────────────
const App=()=>{
  const [user,setUser]=React.useState(()=>S.get());
  const [authMode,setAuthMode]=React.useState(null);
  const handleAuth=u=>{setUser(u);setAuthMode(null);};
  const updateUser=u=>{setUser(u);S.set(u);};
  const isDesktop=window.innerWidth>=768;
  // Silent health check runs in background
  useHealthCheck(user,updateUser);
  // On mount: re-fetch fresh user from DB to catch stale localStorage
  React.useEffect(()=>{
    const cached=S.get();
    if(!cached?.id)return;
    sb.from('users').select('id,full_name,email,city,bio,age,sports,skill_level,friends,avatar_color,onboarded,tos_accepted_at').eq('id',cached.id).single().then(({data})=>{
      if(!data)return;
      const u={...data};delete u.password;
      if(!u.friends)u.friends=[];
      if(!u.onboarded&&(u.city||u.bio||(u.sports&&u.sports.length)))u.onboarded=true;
      S.set(u);
      setUser(u);
    });
  },[]);

  const [pendingGame,setPendingGame]=React.useState(null);

  // Save game link params to sessionStorage before login so we restore after auth
  React.useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const gameId=params.get('game');
    const joinCode=params.get('join');
    if(gameId)sessionStorage.setItem('sm_pending_game',gameId);
    if(joinCode)sessionStorage.setItem('sm_pending_join',joinCode);
  },[]);

  // After login: check for pending game link and open it
  React.useEffect(()=>{
    if(!user)return;
    const gameId=sessionStorage.getItem('sm_pending_game');
    const joinCode=sessionStorage.getItem('sm_pending_join');
    if(!gameId&&!joinCode)return;
    sessionStorage.removeItem('sm_pending_game');
    sessionStorage.removeItem('sm_pending_join');
    if(gameId){
      sb.from('games').select('*').eq('id',gameId).single().then(({data})=>{if(data)setPendingGame(data);});
    } else if(joinCode){
      sb.from('games').select('*').eq('join_code',joinCode).single().then(({data})=>{if(data)setPendingGame(data);});
    }
  },[user?.id]);

  if(!user)return(
    <>
      <GuestFeed onAuth={mode=>setAuthMode(mode)}/>
      {authMode&&<AuthSheet mode={authMode} onAuth={handleAuth} onClose={()=>setAuthMode(null)}/> }
    </>
  );
  if(needsOnboarding(user))return<Onboarding user={user} onComplete={u=>updateUser(u)}/>;

  if(!user.tos_accepted_at)return<ToSGate user={user} onAccept={u=>updateUser(u)}/>;

  if(isDesktop)return<DesktopApp user={user} setUser={updateUser} pendingGame={pendingGame} onLogout={()=>{S.clear();window.location.reload();}}/>;

  return<Feed user={user} setUser={updateUser} pendingGame={pendingGame}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
