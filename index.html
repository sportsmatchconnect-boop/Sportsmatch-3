// Cross-platform clipboard — falls back to execCommand for mobile Safari
const copyToClipboard=async(text)=>{
  try{
    if(navigator.clipboard&&window.isSecureContext){
      await navigator.clipboard.writeText(text);return true;
    }
  }catch(e){}
  try{
    const el=document.createElement('input');
    el.value=text;el.style.position='fixed';el.style.opacity='0';
    document.body.appendChild(el);el.focus();el.select();
    el.setSelectionRange(0,99999);
    const ok=document.execCommand('copy');
    document.body.removeChild(el);return ok;
  }catch(e){return false;}
};

// ── CALENDAR ──────────────────────────────────────────────────
const makeICS=game=>{
  const pad=n=>String(n).padStart(2,'0');
  const dt=new Date(`${game.date}T${game.time||'09:00'}:00`);
  const end=new Date(dt.getTime()+90*60000);
  const fmt=d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
  return['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//SportsMatch//EN','BEGIN:VEVENT',
    `UID:${game.id}@sportsmatch`,`DTSTAMP:${fmt(new Date())}`,`DTSTART:${fmt(dt)}`,`DTEND:${fmt(end)}`,
    `SUMMARY:${game.title}`,`LOCATION:${game.venue_name}${game.address?', '+game.address:''}`,
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
};
const downloadICS=game=>{
  const blob=new Blob([makeICS(game)],{type:'text/calendar'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`${game.title.replace(/\s+/g,'-')}.ics`;a.click();URL.revokeObjectURL(url);
};
const googleCalURL=game=>{

  const p=new URLSearchParams({action:'TEMPLATE',text:game.title,dates:`${fmt(dt)}/${fmt(end)}`,location:game.venue_name+(game.address?', '+game.address:'')});
  return`https://calendar.google.com/calendar/render?${p}`;

const ToSGate=({user,onAccept})=>{
  const [scrolled,setScrolled]=React.useState(false);
  const [accepting,setAccepting]=React.useState(false);
  const scrollRef=React.useRef(null);
  const checkScrolled=()=>{
    const el=scrollRef.current;
    if(!el)return;
    // Allow 2px tolerance for rounding differences across browsers
    if(el.scrollTop+el.clientHeight>=el.scrollHeight-2)setScrolled(true);
  };
  // On mount: if content fits on screen without scrolling, unlock immediately
  React.useEffect(()=>{
    const el=scrollRef.current;
    if(!el)return;
    if(el.scrollHeight<=el.clientHeight)setScrolled(true);
  },[]);
  const accept=async()=>{
    setAccepting(true);

const PhotoGallery=({game,user,onClose})=>{
  const [photos,setPhotos]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [uploading,setUploading]=React.useState(false);
  const [selected,setSelected]=React.useState(null);
  const [err,setErr]=React.useState('');
  const [deleting,setDeleting]=React.useState(null);
  const fileRef=React.useRef(null);
  const pIds=game.players||[];
  const isAdmin=user.id==='af18c523-214d-49db-b9e4-4d76951dbe17';
  const wasPlayer=pIds.includes(user.id)||game.host_id===user.id||isAdmin;
  const myPhotoCount=photos.filter(p=>p.user_id===user.id).length;

  const loadPhotos=async()=>{
    setLoading(true);
    const{data}=await sb.from('game_photos').select('*').eq('game_id',game.id).order('created_at',{ascending:false});
    setPhotos(data||[]);setLoading(false);
  };
  React.useEffect(()=>{loadPhotos();},[game.id]);

  const compressImage=async(file)=>{
    return new Promise((resolve)=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=1400;
          let w=img.width,h=img.height;
          if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}
          const canvas=document.createElement('canvas');
          canvas.width=w;canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          canvas.toBlob(blob=>resolve(blob||file),'image/jpeg',0.82);
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

  const uploadPhoto=async(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    if(myPhotoCount>=5){setErr('You can only upload 5 photos per game.');return;}
    setUploading(true);setErr('');
    // Compress before checking size
    const compressed=await compressImage(file);
    if(compressed.size>5*1024*1024){setErr('Photo is too large even after compression. Try a different photo.');setUploading(false);return;}
    const path=`${game.id}/${user.id}_${Date.now()}.jpg`;
    const{error:upErr}=await sb.storage.from('game-photos').upload(path,compressed,{contentType:'image/jpeg',upsert:false});
    if(upErr){setErr('Upload failed. Try again.');setUploading(false);return;}
    const{data:{publicUrl}}=sb.storage.from('game-photos').getPublicUrl(path);
    await sb.from('game_photos').insert({game_id:game.id,user_id:user.id,storage_path:path,url:publicUrl,is_public:true});
    await loadPhotos();setUploading(false);
  };

  const togglePublic=async(photo)=>{
    const newVal=!photo.is_public;
    await sb.from('game_photos').update({is_public:newVal}).eq('id',photo.id);
    setPhotos(prev=>prev.map(p=>p.id===photo.id?{...p,is_public:newVal}:p));
    // Also update selected so the button label flips immediately
    setSelected(prev=>prev&&prev.id===photo.id?{...prev,is_public:newVal}:prev);
  };

  const deletePhoto=async(photo)=>{
    setDeleting(photo.id);
    await sb.storage.from('game-photos').remove([photo.storage_path]);
    await sb.from('game_photos').delete().eq('id',photo.id);
    setPhotos(prev=>prev.filter(p=>p.id!==photo.id));
    if(selected?.id===photo.id)setSelected(null);
    setDeleting(null);
  };

  const visiblePhotos=photos.filter(p=>p.is_public||p.user_id===user.id);
  const sport=sportInfo(game.sport);

  return(
    <div className="overlay" onClick={onClose}>
      <div className="fullsheet" onClick={e=>e.stopPropagation()} style={{display:'flex',flexDirection:'column'}}>
        <div style={{background:'linear-gradient(135deg,#052e16,#16a34a)',padding:'1.25rem 1.25rem 1rem',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <button onClick={onClose} style={{width:30,height:30,borderRadius:'50%',background:'rgba(255,255,255,.15)',border:'none',color:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem',flexShrink:0}}>✕</button>
            <div style={{flex:1,minWidth:0}}>
              <p className="syne" style={{color:'white',fontWeight:800,fontSize:'1rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{game.title}</p>
              <p style={{color:'rgba(255,255,255,.6)',fontSize:'.72rem'}}>{sport.e} {fmtDate(game.date)} · {photos.length} photo{photos.length!==1?'s':''}</p>
            </div>
            {wasPlayer&&myPhotoCount<5&&(
              <>
                <input ref={fileRef} type="file" accept="image/jpeg,image/png,image/webp,image/heic" style={{display:'none'}} onChange={uploadPhoto}/>
                <button onClick={()=>fileRef.current&&fileRef.current.click()} disabled={uploading}
                  style={{padding:'10px 18px',borderRadius:12,background:'white',border:'none',color:'#16a34a',fontSize:'.82rem',fontWeight:700,cursor:'pointer',flexShrink:0,display:'flex',alignItems:'center',gap:6,fontFamily:'Syne,sans-serif',boxShadow:'0 2px 8px rgba(0,0,0,.15)'}}>
                  {uploading?<Spin s={14} c='#16a34a'/>:<>📷 Add Photo</>}
                </button>
              </>
            )}
          </div>
          {err&&<p style={{color:'#fca5a5',fontSize:'.72rem',marginTop:4}}>{err}</p>}
          {wasPlayer&&myPhotoCount>=5&&<p style={{color:'rgba(255,255,255,.5)',fontSize:'.7rem'}}>You have uploaded the maximum of 5 photos.</p>}
        </div>

        <div style={{flex:1,overflowY:'auto',padding:'1rem'}}>
          {loading&&<div style={{display:'flex',justifyContent:'center',padding:'3rem'}}><Spin c='#16a34a' s={28}/></div>}
          {!loading&&visiblePhotos.length===0&&(
            <div style={{textAlign:'center',padding:'3rem 1rem'}}>
              <p style={{fontSize:'2.5rem',marginBottom:10}}>📷</p>
              <p style={{fontWeight:700,color:'#0f172a',marginBottom:6,fontFamily:'Syne,sans-serif'}}>No photos yet</p>
              <p style={{color:'#94a3b8',fontSize:'.85rem'}}>{wasPlayer?'Be the first to add a photo from this game.':'No public photos have been added yet.'}</p>
            </div>
          )}
          {!loading&&visiblePhotos.length>0&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:3}}>
              {visiblePhotos.map(photo=>(
                <div key={photo.id} onClick={()=>setSelected(photo)} style={{position:'relative',aspectRatio:'1',borderRadius:8,overflow:'hidden',cursor:'pointer',background:'#e2e8f0'}}>
                  <img src={photo.url} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                  {!photo.is_public&&<div style={{position:'absolute',top:4,right:4,background:'rgba(0,0,0,.6)',borderRadius:4,padding:'2px 5px',fontSize:'.6rem',color:'white'}}>🔒</div>}
                </div>
              ))}
            </div>
          )}
        </div>

        {selected&&(
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.92)',zIndex:70,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}} onClick={()=>setSelected(null)}>
            <div style={{width:'100%',maxWidth:480,padding:'1rem',display:'flex',flexDirection:'column',alignItems:'center',gap:12}} onClick={e=>e.stopPropagation()}>
              <img src={selected.url} alt="" style={{width:'100%',maxHeight:'65vh',objectFit:'contain',borderRadius:12}}/>
              {selected.user_id===user.id&&(
                <div style={{display:'flex',gap:10,width:'100%'}}>
                  <button onClick={()=>togglePublic(selected)} style={{flex:1,padding:'10px',borderRadius:12,border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.1)',color:'white',fontSize:'.8rem',fontWeight:600,cursor:'pointer'}}>
                    {selected.is_public?'🌍 Public — tap to make private':'🔒 Private — tap to make public'}
                  </button>
                  <button onClick={()=>deletePhoto(selected)} disabled={deleting===selected.id} style={{padding:'10px 16px',borderRadius:12,border:'none',background:'#ef4444',color:'white',fontSize:'.8rem',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                    {deleting===selected.id?<Spin s={14}/>:'🗑️'}
                  </button>
                </div>
              )}
              <button onClick={()=>setSelected(null)} style={{color:'rgba(255,255,255,.5)',background:'none',border:'none',cursor:'pointer',fontSize:'.85rem'}}>Close</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const ArchivePage=({user})=>{
  const [games,setGames]=React.useState([]);
  const [myGames,setMyGames]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [myGamesLoading,setMyGamesLoading]=React.useState(false);
  const [selectedGame,setSelectedGame]=React.useState(null);
  const [showMyGames,setShowMyGames]=React.useState(false);
  const today=localToday();
  const carouselRef=React.useRef(null);

  const loadArchive=async()=>{
    const{data:photoGames}=await sb.from('game_photos').select('game_id').eq('is_public',true);
    const gameIds=[...new Set((photoGames||[]).map(p=>p.game_id))];
    if(gameIds.length===0){setLoading(false);return;}
    const{data}=await sb.from('games').select('*').in('id',gameIds).lt('date',today).order('date',{ascending:false});
    const counts={};
    (photoGames||[]).forEach(p=>{counts[p.game_id]=(counts[p.game_id]||0)+1;});
    setGames((data||[]).map(g=>({...g,photoCount:counts[g.id]||0})));
    setLoading(false);
  };

  const loadMyGames=async()=>{
    setMyGamesLoading(true);
    // Separate queries to avoid JSONB .or() 400 error
    const[{data:hosted},{data:played}]=await Promise.all([
      sb.from('games').select('*').eq('host_id',user.id).lt('date',today).order('date',{ascending:false}),
      sb.from('games').select('*').contains('players',[user.id]).lt('date',today).order('date',{ascending:false}),
    ]);
    // Merge and deduplicate by id
    const seen=new Set();
    const data=[...(hosted||[]),...(played||[])].filter(g=>{
      if(seen.has(g.id))return false;seen.add(g.id);return true;
    }).sort((a,b)=>b.date.localeCompare(a.date));
    const{data:photoGames}=await sb.from('game_photos').select('game_id').eq('is_public',true);
    const counts={};
    (photoGames||[]).forEach(p=>{counts[p.game_id]=(counts[p.game_id]||0)+1;});
    setMyGames((data||[]).map(g=>({...g,photoCount:counts[g.id]||0})));
    setMyGamesLoading(false);
  };

  React.useEffect(()=>{loadArchive();},[]);
  React.useEffect(()=>{if(showMyGames&&myGames.length===0)loadMyGames();},[showMyGames]);

  // Auto-scroll carousel
  React.useEffect(()=>{
    if(!carouselRef.current||games.length===0)return;
    let pos=0;let dir=1;
    const el=carouselRef.current;
    const tick=setInterval(()=>{
      pos+=0.5*dir;
      if(pos>=el.scrollWidth-el.clientWidth-2){dir=-1;}
      if(pos<=0){dir=1;}
      el.scrollLeft=pos;
    },16);
    return()=>clearInterval(tick);
  },[games.length]);

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'#0f172a',paddingBottom:90}}>
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.25rem 1.25rem'}}>
        <p style={{color:'rgba(255,255,255,.55)',fontSize:'.75rem',fontWeight:500}}>Community</p>
        <h1 className="syne" style={{color:'white',fontSize:'1.4rem',fontWeight:800,marginTop:2}}>Photo Archive 📸</h1>
        <p style={{color:'rgba(255,255,255,.5)',fontSize:'.75rem',marginTop:4}}>Game memories from across SportsMatch</p>
      </div>

      {/* Horizontal carousel */}
      {!loading&&games.length>0&&(
        <div style={{marginTop:16,marginBottom:4}}>
          <p style={{color:'rgba(255,255,255,.4)',fontSize:'.68rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em',padding:'0 1rem',marginBottom:10}}>Recent memories</p>
          <div ref={carouselRef} style={{display:'flex',gap:12,overflowX:'auto',padding:'0 1rem 12px',scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}}
            onMouseEnter={()=>{if(carouselRef.current)carouselRef.current._paused=true;}}
            onMouseLeave={()=>{if(carouselRef.current)carouselRef.current._paused=false;}}>
            {games.slice(0,10).map(g=>(
              <ArchiveCard key={g.id} g={g} onClick={()=>setSelectedGame(g)} width="220px"/>
            ))}
          </div>
        </div>
      )}

      {/* Find my game button */}
      <div style={{padding:'0 1rem',marginBottom:16}}>
        <button onClick={()=>setShowMyGames(!showMyGames)}
          style={{width:'100%',padding:'14px',borderRadius:14,border:'1.5px solid rgba(255,255,255,.15)',background:showMyGames?'rgba(255,255,255,.12)':'rgba(255,255,255,.06)',color:'white',fontSize:'.9rem',fontWeight:700,fontFamily:'Syne,sans-serif',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          📂 {showMyGames?'Hide my games':'Find my game — add photos'}
        </button>
      </div>

      {/* My games list */}
      {showMyGames&&(
        <div style={{padding:'0 1rem',display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
          <p style={{color:'rgba(255,255,255,.4)',fontSize:'.72rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>Your past games</p>
          {myGamesLoading&&<div style={{display:'flex',justifyContent:'center',padding:'2rem'}}><Spin c='#4ade80' s={24}/></div>}
          {!myGamesLoading&&myGames.length===0&&(
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.85rem',textAlign:'center',padding:'1.5rem'}}>No past games found.</p>
          )}
          {!myGamesLoading&&myGames.map(g=>(
            <ArchiveCard key={g.id} g={g} onClick={()=>setSelectedGame(g)}/>
          ))}
        </div>
      )}

      {/* Main archive reel */}
      <div style={{padding:'0 1rem',display:'flex',flexDirection:'column',gap:14}}>
        {loading&&<div style={{display:'flex',justifyContent:'center',padding:'3rem'}}><Spin c='#4ade80' s={28}/></div>}
        {!loading&&games.length===0&&!showMyGames&&(
          <div style={{textAlign:'center',padding:'3rem 1rem'}}>
            <p style={{fontSize:'3rem',marginBottom:12}}>📷</p>
            <p style={{color:'white',fontWeight:700,fontSize:'1.1rem',fontFamily:'Syne,sans-serif',marginBottom:8}}>No photos yet</p>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.85rem',lineHeight:1.6}}>Once games end, players can add photos. They will appear here.</p>
          </div>
        )}
        {!loading&&games.length>0&&(
          <>
            <p style={{color:'rgba(255,255,255,.4)',fontSize:'.68rem',fontWeight:600,textTransform:'uppercase',letterSpacing:'.08em'}}>All photos</p>
            {games.map((g,i)=>(
              <ArchiveCard key={g.id} g={g} onClick={()=>setSelectedGame(g)}/>
            ))}
          </>
        )}
      </div>
      {selectedGame&&<PhotoGallery game={selectedGame} user={user} onClose={()=>setSelectedGame(null)}/>}
    </div>
  );
};


// Native share with game info in message body
const shareGame=async(game,link)=>{
  const sp=game.sport?game.sport:'Game';
  const dateStr=game.date?new Date(game.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}):'';
  const timeStr=game.time?` at ${fmtTime(game.time)}`:'';
  const venueStr=game.venue_name?` at ${game.venue_name}`:'';
  const title=`Join my ${sp} game${venueStr} — ${dateStr}${timeStr}`;
  if(navigator.share){
    try{
      // title shows as preview header, url is the clean tappable link
      await navigator.share({title,url:link});
      return;
    }catch(e){}
  }
  // Fallback: copy just the clean link
  const copied=await copyToClipboard(link);
  return copied?'copied':'failed';
};

          <span key={s.n} style={{padding:'7px 12px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:99,fontSize:'.72rem',color:'#475569',fontWeight:500}}>{s.e} {s.n}</span>

      <button onClick={()=>onAuth('signup')} className="btn-green" style={{width:'100%',padding:'16px',borderRadius:16,fontSize:'1rem',fontFamily:'Syne,sans-serif',fontWeight:700,boxShadow:'0 8px 32px rgba(22,163,74,.4)'}}>Sign up to see all games</button>

// ── AUTH ──────────────────────────────────────────────────────
const AuthSheet=({mode:init,onAuth,onClose})=>{
  const [mode,setMode]=React.useState(init);
  const [f,setF]=React.useState({name:'',email:'',password:'',confirm:''});
  const [err,setErr]=React.useState('');
  const [busy,setBusy]=React.useState(false);
  const upd=(k,v)=>{setF(p=>({...p,[k]:v}));setErr('');};
  const signup=async()=>{
    if(!f.name.trim())return setErr('Name is required');
    const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if(!emailRe.test(f.email.trim()))return setErr('Enter a valid email address');
    if(f.password.length<6)return setErr('Password must be at least 6 characters');
    if(f.password!==f.confirm)return setErr('Passwords do not match');
    setBusy(true);
    try{
      const{data:ex}=await sb.from('users').select('id').eq('email',f.email.trim().toLowerCase()).maybeSingle();
      if(ex){setErr('Email already in use.');setBusy(false);return;}
      const color=COLORS[Math.floor(Math.random()*COLORS.length)];
      const{data,error}=await sb.from('users').insert({full_name:f.name.trim(),email:f.email.trim().toLowerCase(),password:f.password,avatar_color:color,onboarded:false}).select().single();
      if(error)throw error;
      const u={...data};delete u.password;S.set(u);onAuth(u);
    }catch(e){setErr(e.message||'Something went wrong.');}
    setBusy(false);
  };
  const login=async()=>{
    if(!f.email.trim()||!f.password)return setErr('Fill in all fields');
    setBusy(true);
    try{
      const{data,error}=await sb.from('users').select('id,full_name,email,city,bio,age,sports,skill_level,friends,avatar_color,onboarded,tos_accepted_at,password').eq('email',f.email.trim().toLowerCase()).eq('password',f.password).maybeSingle();
      if(error||!data){setErr('Wrong email or password.');setBusy(false);return;}
      const u={...data};delete u.password;
      if(u.city||u.bio||(u.sports&&u.sports.length>0)){u.onboarded=true;}
      S.set(u);onAuth(u);
    }catch(e){setErr('Something went wrong.');}
    setBusy(false);
  };
  const [resetMode,setResetMode]=React.useState(false);
  const [resetEmail,setResetEmail]=React.useState('');
  const [resetSent,setResetSent]=React.useState(false);
  const [resetBusy,setResetBusy]=React.useState(false);
  const sendReset=async()=>{
    if(!resetEmail.includes('@'))return setErr('Enter a valid email');
    setResetBusy(true);
    await sb.auth.resetPasswordForEmail(resetEmail.trim().toLowerCase(),{redirectTo:'https://playsportsmatch.com'});
    setResetSent(true);setResetBusy(false);
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.25rem'}}>
          <div style={{width:36,height:4,background:'#e2e8f0',borderRadius:99,margin:'0 auto 0 auto',flex:1}}/>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:'50%',background:'#f1f5f9',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',color:'#64748b',marginLeft:12,flexShrink:0}}>✕</button>
        </div>
        <p className="syne" style={{fontSize:'1.4rem',fontWeight:800,color:'#0f172a',marginBottom:4}}>{mode==='signup'?'Join SportsMatch':'Welcome back'}</p>
        <p style={{color:'#94a3b8',fontSize:'.82rem',marginBottom:'1.5rem'}}>{mode==='signup'?'Free forever. No credit card.':'Sign in to see and join games.'}</p>
        <div style={{display:'grid',gap:12}}>
          <ErrBox msg={err}/>
          {mode==='signup'&&<div><Lbl>Your Name</Lbl><Inp placeholder="Alex Johnson" value={f.name} onChange={e=>upd('name',e.target.value)}/></div>}
          <div>
            <Lbl>Email</Lbl>
            <Inp type="email" placeholder="you@example.com" value={f.email} onChange={e=>upd('email',e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='login'&&login()}/>
            {mode==='signup'&&<p style={{fontSize:'.68rem',color:'#94a3b8',marginTop:5,lineHeight:1.4}}>Use a real email — we'll send you game notifications here.</p>}
          </div>
          <div><Lbl>Password</Lbl><Inp type="password" placeholder={mode==='signup'?'At least 6 characters':'Your password'} value={f.password} onChange={e=>upd('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='login'&&login()}/></div>
          {mode==='signup'&&<div><Lbl>Confirm Password</Lbl><Inp type="password" placeholder="Same again" value={f.confirm} onChange={e=>upd('confirm',e.target.value)} onKeyDown={e=>e.key==='Enter'&&signup()}/></div>}
          <button onClick={mode==='signup'?signup:login} disabled={busy} className="btn-green" style={{width:'100%',padding:'14px',borderRadius:13,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:4}}>
            {busy?<Spin/>:mode==='signup'?'Create Account':'Sign In'}
          </button>
          <p style={{textAlign:'center',fontSize:'.78rem',color:'#94a3b8'}}>
            {mode==='signup'?'Have an account?':'New here?'}{' '}
            <button onClick={()=>{setMode(mode==='signup'?'login':'signup');setErr('');setF({name:'',email:'',password:'',confirm:''}); }} style={{background:'none',border:'none',color:'#16a34a',fontWeight:600,cursor:'pointer',fontSize:'.78rem'}}>{mode==='signup'?'Sign in':'Create account'}</button>
          </p>
          {mode==='login'&&!resetMode&&(
            <p style={{textAlign:'center',fontSize:'.78rem',color:'#94a3b8'}}>
              <button onClick={()=>{setResetMode(true);setErr('');}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'.78rem',textDecoration:'underline'}}>Forgot password?</button>
            </p>
          )}
          {mode==='login'&&resetMode&&(
            <div style={{borderTop:'1px solid #f1f5f9',paddingTop:14,display:'grid',gap:10}}>
              {resetSent?(
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:10,padding:'12px 14px',textAlign:'center'}}>
                  <p style={{fontWeight:600,fontSize:'.85rem',color:'#15803d',marginBottom:4}}>Check your email</p>
                  <p style={{fontSize:'.78rem',color:'#16a34a'}}>We sent a password reset link to {resetEmail}</p>
                </div>
              ):(
                <>
                  <p style={{fontSize:'.8rem',color:'#64748b'}}>Enter your email and we will send you a reset link.</p>
                  <div><Lbl>Email</Lbl><Inp type="email" placeholder="you@example.com" value={resetEmail} onChange={e=>setResetEmail(e.target.value)}/></div>
                  <button onClick={sendReset} disabled={resetBusy} className="btn-green" style={{width:'100%',padding:'12px',borderRadius:12,fontSize:'.88rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                    {resetBusy?<Spin/>:'Send Reset Link'}
                  </button>
                  <button onClick={()=>{setResetMode(false);setErr('');}} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'.78rem',cursor:'pointer',textAlign:'center'}}>← Back to sign in</button>
                </>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── ONBOARDING ────────────────────────────────────────────────
const Onboarding=({user,onComplete})=>{
  const [step,setStep]=React.useState(0);
  const [data,setData]=React.useState({age:'',city:'',sports:[],level:'',days:[],bio:''});
  const [saving,setSaving]=React.useState(false);
  const upd=(k,v)=>setData(d=>({...d,[k]:v}));
  const tog=(k,v)=>setData(d=>({...d,[k]:d[k].includes(v)?d[k].filter(x=>x!==v):[...d[k],v]}));
  const titles=['Where are you based?','What do you play?','Your skill level','When are you free?','About you'];
  const subs=['Helps us find games near you','Pick all sports you play','Be honest, helps you find the right games','Match you with games that fit','Optional, you can edit this later'];
  const ageError=()=>{
    const a=parseInt(String(data.age).trim());
    if(!data.age)return null; // no error shown until they type
    if(isNaN(a)||a<0||a>120)return 'Please enter a valid age.';
    if(a<13)return 'You must be at least 13 to use SportsMatch.';
    return null;
  };
  const canNext=()=>{
    if(step===0){
      const a=parseInt(String(data.age).trim());
      return data.city.trim()&&data.age&&!isNaN(a)&&a>=13&&a<=120;
    }
    if(step===1)return data.sports.length>0;
    if(step===2)return data.level;
    if(step===3)return data.days.length>0;
    return true;
  };
  const finish=async()=>{
    setSaving(true);
    const updates={age:data.age,city:data.city,sports:data.sports,skill_level:data.level,availability:data.days,bio:data.bio,onboarded:true};
    const{data:updated}=await sb.from('users').update(updates).eq('id',user.id).select().single();
    setSaving(false);
    const u=updated?{...updated}:{...user,...updates};delete u.password;S.set(u);onComplete(u);
  };
  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'white',display:'flex',flexDirection:'column'}}>
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.5rem 1.75rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <p className="syne" style={{color:'white',fontSize:'1rem',fontWeight:700}}>Set up your profile</p>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'white',padding:'5px 12px',borderRadius:99,fontSize:'.75rem',cursor:'pointer'}}>Back</button>}
        </div>
        <div style={{display:'flex',gap:6,marginBottom:14}}>{titles.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:99,background:i<=step?'white':'rgba(255,255,255,.2)',transition:'background .3s'}}/>)}</div>
        <p style={{color:'rgba(255,255,255,.55)',fontSize:'.72rem',marginBottom:4}}>Step {step+1} of {titles.length}</p>
        <h2 className="syne" style={{color:'white',fontSize:'1.2rem',fontWeight:800,marginBottom:4}}>{titles[step]}</h2>
        <p style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem'}}>{subs[step]}</p>
      </div>
      <div style={{flex:1,padding:'1.5rem',overflowY:'auto'}}>
        <div className="fadein" key={step}>
          {step===0&&<div style={{display:'grid',gap:14}}>
            <div>
              <Lbl>Your Age <span style={{color:'#ef4444'}}>*</span></Lbl>
              <Inp type="number" placeholder="Enter your age" min="13" max="120" value={data.age} onChange={e=>upd('age',e.target.value)} style={{width:'45%'}}/>
              {ageError()&&<p style={{fontSize:'.72rem',color:'#ef4444',marginTop:5}}>{ageError()}</p>}
              {!ageError()&&data.age&&parseInt(data.age)>=13&&parseInt(data.age)<=15&&<p style={{fontSize:'.72rem',color:'#f97316',marginTop:5}}>Players 13–15 will need parental consent when joining games.</p>}
              {!ageError()&&data.age&&parseInt(data.age)>=16&&parseInt(data.age)<18&&<p style={{fontSize:'.72rem',color:'#f97316',marginTop:5}}>Players under 18 may see a warning when joining games with adult players.</p>}
            </div>
            <div><Lbl>City <span style={{color:'#ef4444'}}>*</span></Lbl><Inp placeholder="Santa Barbara" value={data.city} onChange={e=>upd('city',e.target.value)}/></div>
            <div style={{background:'#f0fdf4',borderRadius:12,padding:'12px 14px',border:'1px solid #86efac'}}><p style={{fontSize:'.78rem',color:'#15803d',fontWeight:500}}>Your location helps us show games near you. We never share your exact address.</p></div>
          </div>}
          {step===1&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>{SPORTS.map(s=><button key={s.id} className={`sport-btn ${data.sports.includes(s.id)?'on':''}`} onClick={()=>tog('sports',s.id)}><span>{s.e}</span><span>{s.l}</span>{data.sports.includes(s.id)&&<span style={{marginLeft:'auto',color:'#16a34a'}}>✓</span>}</button>)}</div>}
          {step===2&&<div style={{display:'grid',gap:10}}>{LEVELS.map(l=><button key={l} onClick={()=>upd('level',l.toLowerCase())} style={{padding:'14px 16px',borderRadius:14,border:`2px solid ${data.level===l.toLowerCase()?'#16a34a':'#e2e8f0'}`,background:data.level===l.toLowerCase()?'#f0fdf4':'white',cursor:'pointer',textAlign:'left',transition:'all .15s'}}><p style={{fontWeight:700,fontSize:'.9rem',color:data.level===l.toLowerCase()?'#15803d':'#0f172a'}}>{l}</p><p style={{fontSize:'.75rem',color:'#94a3b8',marginTop:3}}>{l==='Beginner'?'Just starting out or play casually':l==='Intermediate'?'Know the rules, play regularly':l==='Advanced'?'Competitive league or varsity level':'Former or current competitive athlete'}</p></button>)}</div>}
          {step===3&&<div><p style={{fontSize:'.78rem',color:'#64748b',marginBottom:12}}>Pick the days you are usually free:</p><div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{DAYS.map(d=><button key={d} className={`day-chip ${data.days.includes(d)?'on':''}`} onClick={()=>tog('days',d)}>{d}</button>)}</div></div>}
          {step===4&&<div style={{display:'grid',gap:14}}><div><Lbl>Short Bio (optional)</Lbl><textarea value={data.bio} onChange={e=>upd('bio',e.target.value)} placeholder="Competitive soccer player, love pickup basketball on weekends..." rows={4} style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',resize:'none',fontFamily:'DM Sans,sans-serif',lineHeight:1.6}}/></div></div>}
        </div>
      </div>
      <div style={{padding:'1rem 1.5rem 2rem',borderTop:'1px solid #f1f5f9',background:'white'}}>
        <button onClick={step<titles.length-1?()=>setStep(s=>s+1):finish} disabled={!canNext()||saving} className="btn-green" style={{width:'100%',padding:'15px',borderRadius:14,fontSize:'1rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,opacity:!canNext()||saving?.5:1}}>
          {saving?<><Spin/>Saving...</>:step===titles.length-1?'Enter App':'Continue'}
        </button>

      </div>
    </div>
  );
};

// ── CALENDAR SHEET ────────────────────────────────────────────

      </div>
      <p className="syne" style={{fontSize:'1.2rem',fontWeight:800,color:'#0f172a',marginBottom:4}}>Add to Calendar</p>

      <div style={{display:'grid',gap:10}}>

// ── GAME CHAT ─────────────────────────────────────────────────
const GameChat=({game,user,onClose})=>{
  const [msgs,setMsgs]=React.useState([]);
  const [text,setText]=React.useState('');
  const [sending,setSending]=React.useState(false);
  const bottomRef=React.useRef(null);
  const load=async()=>{
    const{data}=await sb.from('game_messages').select('*').eq('game_id',game.id).order('created_at',{ascending:true});
    setMsgs(data||[]);
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),100);
  };
  React.useEffect(()=>{
    load();
    const sub=sb.channel(`game_${game.id}`).on('postgres_changes',{event:'INSERT',schema:'public',table:'game_messages',filter:`game_id=eq.${game.id}`},()=>load()).subscribe();
    return()=>sb.removeChannel(sub);
  },[game.id]);
  const send=async()=>{
    if(!text.trim()||sending)return;
    const newMsg={game_id:game.id,user_id:user.id,user_name:user.full_name,avatar_color:user.avatar_color,text:text.trim(),created_at:new Date().toISOString()};
    // Optimistic update — show message instantly
    setMsgs(m=>[...m,{...newMsg,id:'temp_'+Date.now()}]);
    setText('');
    setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),50);
    setSending(true);
    await sb.from('game_messages').insert(newMsg);
    try{
      const fifteenAgo=new Date(Date.now()-15*60*1000).toISOString();
      const{data:recent}=await sb.from('game_messages').select('id').eq('game_id',game.id).neq('user_id',user.id).gte('created_at',fifteenAgo).limit(1);
      if(!recent||recent.length===0){
        const{data:gameData}=await sb.from('games').select('players,host_id,title,sport,venue_name,address,date,time,id').eq('id',game.id).single();
        if(gameData){
          const allIds=[...new Set([...(gameData.players||[]),gameData.host_id])].filter(id=>id&&id!==user.id);
          if(allIds.length>0){
            const{data:pUsers}=await sb.from('users').select('email').in('id',allIds);
            const emails=(pUsers||[]).map(u=>u.email).filter(Boolean);
            if(emails.length>0){
              await queueNotif('game_message',{...gameData,venue_name:user.full_name,address:newMsg.text},emails);
            }
          }
        }
      }
    }catch(e){console.log('Chat notif skipped:',e.message);}
    setSending(false);
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="fullsheet" onClick={e=>e.stopPropagation()} style={{display:'flex',flexDirection:'column'}}>
        <div style={{padding:'1.25rem 1.25rem 1rem',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',gap:12,background:'white',borderRadius:'24px 24px 0 0'}}>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.2rem',color:'#94a3b8',padding:'4px'}}>←</button>
          <div style={{flex:1}}><p className="syne" style={{fontWeight:700,fontSize:'1rem',color:'#0f172a'}}>{game.title}</p><p style={{fontSize:'.72rem',color:'#94a3b8'}}>Group chat</p></div>
          <button onClick={onClose} style={{width:30,height:30,borderRadius:'50%',background:'#f1f5f9',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',color:'#64748b',flexShrink:0}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'1rem 1.25rem',display:'flex',flexDirection:'column',gap:12}}>
          {msgs.length===0&&<div style={{textAlign:'center',padding:'2rem',color:'#94a3b8',fontSize:'.82rem'}}>No messages yet. Say hello!</div>}
          {msgs.map((m,i)=>{
            const isMe=m.user_id===user.id;
            return<div key={m.id||i} style={{display:'flex',flexDirection:'column',alignItems:isMe?'flex-end':'flex-start',gap:4}}>
              {!isMe&&<p style={{fontSize:'.65rem',color:'#94a3b8',marginLeft:4}}>{m.user_name}</p>}
              <div className={isMe?'msg-me':'msg-them'}>{m.text}</div>
            </div>;
          })}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:'.5rem 1.25rem 0',background:'white'}}>
          {!localStorage.getItem('sm_chat_notice')&&(
            <div style={{background:'#f8fafc',borderRadius:10,padding:'8px 12px',marginBottom:6,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:'.9rem'}}>ℹ️</span>
              <p style={{fontSize:'.72rem',color:'#64748b',flex:1,lineHeight:1.4}}>Messages are saved for 30 days, then deleted.</p>
              <button onClick={()=>{localStorage.setItem('sm_chat_notice','1');}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'.75rem',padding:'2px',flexShrink:0}}>✕</button>
            </div>
          )}
        </div>
        <div style={{padding:'.5rem 1.25rem 1.5rem',borderTop:'1px solid #f1f5f9',background:'white',display:'flex',gap:10,flexDirection:'column'}}>
          <div style={{display:'flex',gap:10}}>
            <input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Message the group..." style={{flex:1,height:44,padding:'0 14px',borderRadius:22,border:'1.5px solid #e2e8f0',fontSize:'.875rem',fontFamily:'DM Sans,sans-serif'}}/>
            <button onClick={send} disabled={!text.trim()} className="btn-green" style={{width:44,height:44,borderRadius:22,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <p style={{fontSize:'.65rem',color:'#cbd5e1',textAlign:'center'}}>Messages are automatically deleted after 30 days</p>
        </div>
      </div>
    </div>
  );
};

// ── INBOX ─────────────────────────────────────────────────────
const Inbox=({user,friends,onFriendUpdate,onClose})=>{
  const [tab,setTab]=React.useState('requests');
  const [repeatNudges,setRepeatNudges]=React.useState([]);

  // Load repeat nudges — games that ended 1 day and 7 days ago where user was host
  React.useEffect(()=>{
    const loadNudges=async()=>{
      const now=new Date();
      const d1=new Date(now-1*24*60*60*1000).toISOString().split('T')[0];
      const d7=new Date(now-7*24*60*60*1000).toISOString().split('T')[0];
      const dismissed=JSON.parse(localStorage.getItem('sm_repeat_dismissed')||'[]');
      // Games from yesterday or 7 days ago
      const{data}=await sb.from('games').select('*').eq('host_id',user.id).in('date',[d1,d7]);
      const nudges=(data||[]).filter(g=>!dismissed.includes(g.id+'_'+g.date));
      setRepeatNudges(nudges);
    };
    loadNudges();
  },[]);

  const dismissNudge=(g)=>{
    const dismissed=JSON.parse(localStorage.getItem('sm_repeat_dismissed')||'[]');
    localStorage.setItem('sm_repeat_dismissed',JSON.stringify([...dismissed,g.id+'_'+g.date]));
    setRepeatNudges(prev=>prev.filter(n=>n.id!==g.id));
  };
  const [requests,setRequests]=React.useState([]);
  const [threads,setThreads]=React.useState([]);
  const [joinReqs,setJoinReqs]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [acting,setActing]=React.useState(null);
  const [chatWith,setChatWith]=React.useState(null);
  const [gameChatOpen,setGameChatOpen]=React.useState(null);

  const thirtyDaysAgo=new Date(Date.now()-30*24*60*60*1000).toISOString();

  const load=async()=>{
    setLoading(true);
    const[{data:reqs},{data:pms},{data:gms},{data:jreqs}]=await Promise.all([
      sb.from('friend_requests').select('*').eq('to_id',user.id).eq('status','pending'),
      sb.from('private_messages').select('*').or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`).gte('created_at',thirtyDaysAgo).order('created_at',{ascending:false}),
      sb.from('game_messages').select('*').gte('created_at',thirtyDaysAgo).order('created_at',{ascending:false}).limit(200),
      sb.from('join_requests').select('*').eq('status','pending'),
    ]);
    setRequests(reqs||[]);
    // Load game info for join requests separately
    const jrGameIds=[...new Set((jreqs||[]).map(r=>r.game_id).filter(Boolean))];
    let jrGameMap={};
    if(jrGameIds.length>0){
      const{data:jgdata}=await sb.from('games').select('id,title,sport,host_id').in('id',jrGameIds);
      (jgdata||[]).forEach(g=>{jrGameMap[g.id]=g;});
    }
    const enrichedJreqs=(jreqs||[]).map(r=>({...r,games:jrGameMap[r.game_id]})).filter(r=>r.games&&r.games.host_id===user.id);
    setJoinReqs(enrichedJreqs);

    // Build combined iMessage-style threads
    const threadMap={};

    // Private message threads - look up user names separately
    const otherIds=[...new Set((pms||[]).map(m=>m.sender_id===user.id?m.receiver_id:m.sender_id))];
    let userMap={};
    if(otherIds.length>0){
      const{data:udata}=await sb.from('users').select('id,full_name,avatar_color').in('id',otherIds);
      (udata||[]).forEach(u=>{userMap[u.id]=u;});
    }
    for(const m of(pms||[])){
      const isMe=m.sender_id===user.id;
      const otherId=isMe?m.receiver_id:m.sender_id;
      const otherProfile=userMap[otherId]||{full_name:'Player',avatar_color:'#16a34a'};
      const key=`pm_${otherId}`;
      if(!threadMap[key]){
        threadMap[key]={
          key,type:'pm',otherId,
          otherName:otherProfile.full_name,
          otherColor:otherProfile.avatar_color,
          lastMsg:m.text,lastTime:m.created_at,
          isMe,
        };
      }
    }

    // Game chat threads - look up game names separately
    const gameIds=[...new Set((gms||[]).map(m=>m.game_id).filter(Boolean))];
    let gameMap={};
    if(gameIds.length>0){
      const{data:gdata}=await sb.from('games').select('id,title,sport').in('id',gameIds);
      (gdata||[]).forEach(g=>{gameMap[g.id]=g;});
    }
    for(const m of(gms||[])){
      if(!m.game_id)continue;
      const gameInfo=gameMap[m.game_id];
      if(!gameInfo)continue;
      const key=`game_${m.game_id}`;
      if(!threadMap[key]){
        threadMap[key]={
          key,type:'game',gameId:m.game_id,
          gameName:gameInfo.title,gameSport:gameInfo.sport,
          lastMsg:m.text,lastSender:m.user_name,lastTime:m.created_at,
        };
      }
    }

    // Sort by most recent
    const sorted=Object.values(threadMap).sort((a,b)=>new Date(b.lastTime)-new Date(a.lastTime));
    setThreads(sorted);
    setLoading(false);
  };

  React.useEffect(()=>{load();},[]);

  const respondFriend=async(req,accept)=>{
    setActing(req.id);
    if(accept){
      await sb.from('friend_requests').update({status:'accepted'}).eq('id',req.id);
      const myFriends=[...(friends||[]),req.from_id];
      await sb.from('users').update({friends:myFriends}).eq('id',user.id);
      await sb.from('users').update({friends:[...(req.to_friends||[]),user.id]}).eq('id',req.from_id);
      onFriendUpdate&&onFriendUpdate(myFriends);
    }else{
      await sb.from('friend_requests').update({status:'declined'}).eq('id',req.id);
    }
    setRequests(r=>r.filter(x=>x.id!==req.id));setActing(null);
  };

  const respondJoin=async(req,admit)=>{
    setActing(req.id);
    if(admit){
      const{data:game}=await sb.from('games').select('players,max_players').eq('id',req.game_id).single();
      if(game&&(game.players||[]).length<game.max_players){
        await sb.from('games').update({players:[...(game.players||[]),req.user_id]}).eq('id',req.game_id);
      }
    }
    await sb.from('join_requests').update({status:admit?'admitted':'denied'}).eq('id',req.id);
    setJoinReqs(r=>r.filter(x=>x.id!==req.id));setActing(null);
  };

  const totalRequests=requests.length+joinReqs.length;
  const fmtTime=ts=>{
    if(!ts)return'';
    const d=new Date(ts),now=new Date();
    const diff=Math.floor((now-d)/1000);
    if(diff<60)return'now';
    if(diff<3600)return`${Math.floor(diff/60)}m`;
    if(diff<86400)return`${Math.floor(diff/3600)}h`;
    return`${Math.floor(diff/86400)}d`;
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="fullsheet" onClick={e=>e.stopPropagation()}>
        <div style={{padding:'1.25rem 1.25rem 0',borderBottom:'1px solid #f1f5f9',background:'white',borderRadius:'24px 24px 0 0'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',fontSize:'1.2rem',color:'#94a3b8',padding:'4px'}}>←</button>
              <p className="syne" style={{fontWeight:700,fontSize:'1rem',color:'#0f172a'}}>Inbox</p>
            </div>
            <button onClick={onClose} style={{width:30,height:30,borderRadius:'50%',background:'#f1f5f9',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.85rem',color:'#64748b'}}>✕</button>
          </div>
          <div style={{display:'flex',gap:0}}>
            {[{id:'requests',l:`Requests${totalRequests?` (${totalRequests})`:''}`},{id:'messages',l:'Messages'}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'10px 6px',border:'none',background:'none',fontSize:'.78rem',fontWeight:600,cursor:'pointer',borderBottom:`2px solid ${tab===t.id?'#16a34a':'transparent'}`,color:tab===t.id?'#16a34a':'#94a3b8',transition:'all .15s'}}>{t.l}</button>
            ))}
          </div>
        </div>

        <div style={{overflowY:'auto',flex:1}}>
          {loading&&<div style={{display:'flex',justifyContent:'center',padding:'2rem'}}><Spin c='#16a34a' s={24}/></div>}

          {/* REQUESTS TAB */}
          {!loading&&tab==='requests'&&(
            <div style={{padding:'1rem 1.25rem'}}>
              {requests.length===0&&joinReqs.length===0&&repeatNudges.length===0&&<div style={{textAlign:'center',padding:'3rem',color:'#94a3b8'}}><p style={{fontSize:'1.5rem',marginBottom:8}}>📭</p><p style={{fontSize:'.85rem'}}>No pending requests</p></div>}
              {repeatNudges.map(g=>(
                <div key={g.id+'_nudge'} className="card" style={{padding:'1rem',marginBottom:10,border:'1.5px solid #dcfce7',background:'#f0fdf4'}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                    <span style={{fontSize:'1.5rem'}}>{sportInfo(g.sport).e}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <p style={{fontWeight:700,fontSize:'.88rem',color:'#0f172a'}}>Host {g.title} again?</p>
                      <p style={{fontSize:'.72rem',color:'#64748b'}}>This game ended {fmtDate(g.date)} — want to run it again?</p>
                    </div>
                    <button onClick={()=>dismissNudge(g)} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',fontSize:'1rem',padding:4,flexShrink:0}}>✕</button>
                  </div>
                  <div style={{display:'flex',gap:8}}>
                    <button onClick={async()=>{
                      const nextWeek=new Date(Date.now()+7*24*60*60*1000).toISOString().split('T')[0];
                      const{data:newGame}=await sb.from('games').insert({
                        title:g.title,sport:g.sport,venue_name:g.venue_name,address:g.address,
                        city:g.city,max_players:g.max_players,description:g.description,
                        players:[user.id],gear:{},host_id:user.id,host_name:user.full_name,
                        status:'open',is_private:g.is_private,show_in_feed:g.show_in_feed,
                        join_code:g.is_private?String(Math.floor(100000+Math.random()*900000)):null,
                        date:nextWeek,
                      }).select().single();
                      dismissNudge(g);
                    }} className="btn-green" style={{flex:1,padding:'10px',borderRadius:12,fontSize:'.82rem',display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                      🔁 Host it again
                    </button>
                    <button onClick={()=>dismissNudge(g)} className="btn-ghost" style={{padding:'10px 16px',borderRadius:12,fontSize:'.82rem'}}>Not now</button>
                  </div>
                </div>
              ))}
              {requests.map(req=>(
                <div key={req.id} className="card" style={{padding:'1rem',marginBottom:10}}>

  const join=async()=>{

    setBusy(true);
    const{data:game}=await sb.from('games').select('*').eq('join_code',code.trim().toUpperCase()).maybeSingle();

const GameDetail=({game,user,friends,onClose,onUpdate,onFriendUpdate,onDelete})=>{
  const [players,setPlayers]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [busy,setBusy]=React.useState(false);
  const [myGear,setMyGear]=React.useState('');
  const [editGear,setEditGear]=React.useState(false);
  const [savingGear,setSavingGear]=React.useState(false);
  const [showCal,setShowCal]=React.useState(false);
  const [showChat,setShowChat]=React.useState(false);
  const [chatWith,setChatWith]=React.useState(null);
  const [sentReqs,setSentReqs]=React.useState([]);
  const [requestSent,setRequestSent]=React.useState(false);
  const [requestBusy,setRequestBusy]=React.useState(false);
  const [codeInput,setCodeInput]=React.useState('');
  const [codeErr,setCodeErr]=React.useState('');
  const [showCode,setShowCode]=React.useState(false);
  const [showEdit,setShowEdit]=React.useState(false);
  const [ageModal,setAgeModal]=React.useState(null); // null | 'warn' | 'consent'
  const [consentChecked,setConsentChecked]=React.useState(false);
  const [pendingJoin,setPendingJoin]=React.useState(null); // fn to call after confirmation
  const [copied,setCopied]=React.useState(false);

  const pIds=game.players||[];
  const isHost=game.host_id===user?.id;
  // Host always counts as going
  const joined=pIds.includes(user?.id)||isHost;
  // Effective count includes host even if not in players array (legacy data)
  const effectivePIds=isHost&&!pIds.includes(game.host_id)
    ?[...pIds,game.host_id]:pIds;
  const spots=game.max_players-effectivePIds.length;
  const full=spots<=0;
  const pct=Math.round((effectivePIds.length/game.max_players)*100);
  const color=SPORT_COLOR[game.sport]||'#16a34a';
  const sport=sportInfo(game.sport);
  const gearMap=game.gear||{};
  const isPrivate=game.is_private;
  const joinCode=game.join_code;
  // For private games use join_code, for public games use game id
  const gameLink=isPrivate&&joinCode
    ?`${appBaseUrl()}?join=${joinCode}`
    :`${appBaseUrl()}?game=${game.id}`;

  React.useEffect(()=>{
    const load=async()=>{
      if(effectivePIds.length===0){setLoading(false);return;}
      const{data:playerData}=await sb.from('users').select('id,full_name,avatar_color,city,bio,sports,skill_level').in('id',effectivePIds);
      // Load hosted game count for Top Host badge
      const playerList=playerData||[];
      const hostedCounts=await Promise.all(playerList.map(async p=>{
        const{count}=await sb.from('games').select('*',{count:'exact',head:true}).eq('host_id',p.id);
        return{id:p.id,count:count||0};
      }));
      const countMap={};hostedCounts.forEach(h=>{countMap[h.id]=h.count;});
      setPlayers(playerList.map(p=>({...p,games_hosted:countMap[p.id]||0})));
      if(gearMap[user?.id])setMyGear(gearMap[user?.id]);
      // Check if already sent a join request
      if(isPrivate&&!joined&&!isHost){
        const{data:jr}=await sb.from('join_requests').select('id').eq('game_id',game.id).eq('user_id',user.id).maybeSingle();
        if(jr)setRequestSent(true);
      }
      setLoading(false);
    };
    load();
  },[game.id]);

  // Age gate — returns true if safe to proceed, false if modal shown
  const ageGate=(proceedFn)=>{
    const age=parseInt(String(user?.age||'').trim());
    if(isNaN(age)||age>=18){proceedFn();return;}
    if(age<13){setAgeModal('block');return;}
    if(age<=15){setConsentChecked(false);setPendingJoin(()=>proceedFn);setAgeModal('consent');return;}
    // 16-17
    setPendingJoin(()=>proceedFn);setAgeModal('warn');
  };

  const toggleJoin=async()=>{
    if(!user||isHost||busy||(full&&!joined))return;
    if(!joined){ageGate(()=>doToggleJoin());return;}
    doToggleJoin();
  };
  const doToggleJoin=async()=>{
    setBusy(true);
    const np=joined?pIds.filter(p=>p!==user.id):[...pIds,user.id];
    const newGear={...gearMap};if(joined)delete newGear[user.id];
    await sb.from('games').update({players:np,gear:newGear}).eq('id',game.id);
    if(!joined){
      const threshold=Math.ceil(game.max_players*0.8);
      if(np.length>=threshold&&np.length<game.max_players){
        const{data:us}=await sb.from('users').select('email').in('id',np);
        await queueNotif('almost_full',{...game,players:np},(us||[]).map(u=>u.email).filter(Boolean));
      }
    }
    onUpdate&&onUpdate();setBusy(false);onClose();
  };

  const joinWithCode=async()=>{
    if(codeInput.trim().toUpperCase()!==joinCode){setCodeErr('Wrong code. Try again.');return;}
    if(pIds.includes(user.id)){setCodeErr('You are already in this game.');return;}
    if(full){setCodeErr('Sorry, this game is full.');return;}
    ageGate(()=>doJoinWithCode());
  };
  const doJoinWithCode=async()=>{
    setBusy(true);
    const np=[...pIds,user.id];
    await sb.from('games').update({players:np}).eq('id',game.id);
    onUpdate&&onUpdate();setBusy(false);onClose();
  };

  const requestToJoin=()=>{ageGate(()=>doRequestToJoin());};
  const doRequestToJoin=async()=>{
    setRequestBusy(true);
    await sb.from('join_requests').insert({game_id:game.id,user_id:user.id,user_name:user.full_name,status:'pending'});
    // Notify host
    const{data:host}=await sb.from('users').select('email').eq('id',game.host_id).single();
    if(host?.email)await queueNotif('join_request',game,[host.email]);
    setRequestSent(true);setRequestBusy(false);
  };

  const saveGear=async()=>{
    if(!myGear.trim())return;
    setSavingGear(true);
    const ng={...gearMap,[user.id]:myGear.trim()};
    await sb.from('games').update({gear:ng}).eq('id',game.id);
    setSavingGear(false);setEditGear(false);onUpdate&&onUpdate();
  };

  const sendFriendReq=async(p)=>{
    const{data:ex}=await sb.from('friend_requests').select('id').eq('from_id',user.id).eq('to_id',p.id).maybeSingle();
    if(!ex){
      await sb.from('friend_requests').insert({from_id:user.id,to_id:p.id,from_name:user.full_name,to_friends:p.friends||[],status:'pending'});
      const{data:recipient}=await sb.from('users').select('email').eq('id',p.id).single();
      if(recipient?.email){
        await queueNotif('friend_request',{title:user.full_name,sport:'',venue_name:'',address:'',date:'',time:'',max_players:0,players:[],id:'friend'},[recipient.email]);
      }
    }
    setSentReqs(s=>[...s,p.id]);
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="fullsheet" onClick={e=>e.stopPropagation()}>
        {/* HERO */}
        <div style={{background:`linear-gradient(155deg,${color}ee,${color}99)`,padding:'1.5rem 1.25rem 1.5rem',position:'relative'}}>
          <div style={{position:'absolute',top:16,right:16,display:'flex',gap:8}}>
            {isHost&&<button onClick={()=>setShowEdit(true)} style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.2)',border:'none',cursor:'pointer',color:'white',fontSize:'.85rem',display:'flex',alignItems:'center',justifyContent:'center'}}>✏️</button>}
            <button onClick={onClose} style={{width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.2)',border:'none',cursor:'pointer',color:'white',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{width:48,height:48,borderRadius:14,background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem'}}>{sport.e}</div>
            {isPrivate&&<span style={{background:'rgba(255,255,255,.2)',color:'white',fontSize:'.7rem',fontWeight:700,padding:'4px 10px',borderRadius:99,border:'1px solid rgba(255,255,255,.3)'}}>🔒 Private</span>}
          </div>
          <h2 className="syne" style={{color:'white',fontSize:'1.25rem',fontWeight:800,marginBottom:10,lineHeight:1.2}}>{game.title}</h2>
          <div style={{background:'rgba(0,0,0,.15)',borderRadius:12,padding:'8px 12px'}}>
            {[game.venue_name&&{icon:'📍',text:game.venue_name},game.address&&{icon:'🗺️',text:game.address},game.city&&{icon:'📌',text:game.city},{icon:'🗓',text:`${fmtDate(game.date)}${game.time?` at ${fmtTime(game.time)}`:''}`},{icon:'👥',text:`${effectivePIds.length} of ${game.max_players} going`}].filter(Boolean).map((row,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderBottom:i<4?'1px solid rgba(255,255,255,.1)':'none'}}>
                <span style={{fontSize:'.9rem',width:20,textAlign:'center',flexShrink:0}}>{row.icon}</span>
                <span style={{fontSize:'.8rem',color:'rgba(255,255,255,.9)',lineHeight:1.4}}>{row.text}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={{padding:'1rem 1.25rem',display:'grid',gap:12,overflowX:'hidden',width:'100%'}}>
          {/* SPOTS BAR */}
          <div className="card" style={{padding:'1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <p style={{fontWeight:700,fontSize:'.82rem',color:'#0f172a'}}>👥 {effectivePIds.length} of {game.max_players} going</p>
              <p style={{fontSize:'.75rem',color:full?'#ef4444':'#16a34a',fontWeight:600}}>{full?'Full':`${spots} left`}</p>
            </div>
            <div className="progress"><div className="progress-fill" style={{width:`${pct}%`,background:full?'#f87171':`linear-gradient(90deg,${color},${color}99)`}}/></div>
          </div>

          {/* ACTION BUTTONS */}
          <div style={{display:'grid',gap:10}}>
            {/* Join/leave logic */}
            {!isHost&&!joined&&isPrivate&&(
              <>
                {/* Private game — join with code */}
                {!showCode?(
                  <div style={{display:'grid',gap:8}}>
                    <button onClick={()=>setShowCode(true)} className="btn-green" style={{width:'100%',padding:'13px',borderRadius:14,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700}}>
                      🔑 Join with Code
                    </button>
                    <button onClick={requestSent?null:requestToJoin} disabled={requestSent||requestBusy}
                      style={{width:'100%',padding:'13px',borderRadius:14,fontSize:'.88rem',fontWeight:600,border:'1.5px solid #e2e8f0',background:requestSent?'#f0fdf4':'white',color:requestSent?'#16a34a':'#475569',cursor:requestSent?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      {requestBusy?<Spin c='#475569' s={14}/>:requestSent?'✓ Request sent — waiting for host':'Request to Join'}
                    </button>
                  </div>
                ):(
                  <div style={{display:'grid',gap:8}}>
                    <p style={{fontSize:'.78rem',color:'#64748b',textAlign:'center'}}>Enter the code from your host:</p>
                    <input value={codeInput} onChange={e=>{setCodeInput(e.target.value.toUpperCase());setCodeErr('');}} placeholder="Enter code..." maxLength={8}
                      style={{width:'100%',height:52,padding:'0 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'1.2rem',fontFamily:'Syne,sans-serif',fontWeight:700,letterSpacing:'.15em',textAlign:'center'}}/>
                    {codeErr&&<p style={{fontSize:'.75rem',color:'#ef4444',textAlign:'center'}}>{codeErr}</p>}
                    <button onClick={joinWithCode} disabled={busy} className="btn-green" style={{width:'100%',padding:'13px',borderRadius:13,fontSize:'.9rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                      {busy?<Spin/>:'Join Game'}
                    </button>
                    <button onClick={()=>{setShowCode(false);setCodeErr('');}} style={{background:'none',border:'none',color:'#94a3b8',fontSize:'.78rem',cursor:'pointer'}}>← Back</button>
                  </div>
                )}
              </>
            )}
            {!isHost&&!joined&&!isPrivate&&(
              <button onClick={toggleJoin} disabled={busy||(full&&!joined)} className="btn-green"
                style={{width:'100%',padding:'14px',borderRadius:14,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:full?'#f1f5f9':`linear-gradient(135deg,${color},${color}cc)`,color:full?'#94a3b8':'white',border:'none'}}>
                {busy?<Spin/>:full?'Game is Full':'Join Game'}
              </button>
            )}
            {!isHost&&joined&&(
              <button onClick={toggleJoin} disabled={busy}
                style={{width:'100%',padding:'14px',borderRadius:14,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:'white',color:'#ef4444',border:'1.5px solid #fecaca',cursor:'pointer'}}>
                {busy?<Spin c='#ef4444'/>:'✓ You are in — tap to leave'}
              </button>
            )}
            {isHost&&(
              <div style={{display:'grid',gap:8}}>
                <div style={{padding:'12px',borderRadius:14,background:'#f0fdf4',border:'1.5px solid #86efac',textAlign:'center'}}><p style={{fontWeight:600,fontSize:'.88rem',color:'#16a34a'}}>✓ You created this game</p></div>
                <button onClick={()=>onDelete&&onDelete(game.id)} style={{width:'100%',padding:'11px',borderRadius:13,border:'1.5px solid #fecaca',background:'white',color:'#ef4444',fontWeight:600,fontSize:'.85rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>🗑️ Delete this game</button>
              </div>
            )}

            {/* Action buttons row */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button onClick={()=>setShowChat(true)} className="btn-ghost" style={{padding:'12px',borderRadius:12,fontSize:'.82rem',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>💬 Group Chat</button>
              <button onClick={()=>setShowCal(true)} className="btn-ghost" style={{padding:'12px',borderRadius:12,fontSize:'.82rem',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>📅 Calendar</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <button onClick={()=>window.open(mapsURL(game),'_blank')} className="btn-ghost" style={{padding:'12px',borderRadius:12,fontSize:'.82rem',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>🍎 Apple Maps</button>
              <button onClick={()=>window.open(googleMapsURL(game),'_blank')} className="btn-ghost" style={{padding:'12px',borderRadius:12,fontSize:'.82rem',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>🗺️ Google Maps</button>
            </div>

            {/* Private game code + link (host only) */}
            {isHost&&isPrivate&&(
              <div className="card" style={{padding:'1rem'}}>
                <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:10}}>🔒 Private Game Controls</p>
                <p style={{fontSize:'.72rem',color:'#94a3b8',marginBottom:6}}>Join code</p>
                <div style={{background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:12,padding:'12px',fontFamily:'Syne,sans-serif',fontSize:'1.4rem',fontWeight:800,letterSpacing:'.2em',textAlign:'center',color:'#0f172a',marginBottom:10}}>{joinCode}</div>
                <button onClick={async()=>{const r=await shareGame(game,gameLink);if(r==='copied'){setCopied(true);setTimeout(()=>setCopied(false),2000);}}} className="btn-ghost" style={{width:'100%',padding:'10px',borderRadius:12,fontSize:'.82rem',marginBottom:6}}>📤 {copied?'✓ Link copied!':'Share game link'}</button>
                <p style={{fontSize:'.68rem',color:'#94a3b8',textAlign:'center',lineHeight:1.4}}>Share this link or code with people you want to invite</p>
              </div>
            )}
            {/* Public game share link — visible to everyone */}
            {!isPrivate&&(
              <div className="card" style={{padding:'1rem',display:'flex',alignItems:'center',gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:2}}>Invite someone to this game</p>
                  <p style={{fontSize:'.72rem',color:'#94a3b8'}}>Send them the link — they can join in one tap</p>
                </div>
                <button onClick={async()=>{const r=await shareGame(game,gameLink);if(r==='copied'){setCopied(true);setTimeout(()=>setCopied(false),2000);}}}
                  style={{padding:'10px 16px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#16a34a,#15803d)',color:'white',fontSize:'.82rem',fontWeight:700,cursor:'pointer',fontFamily:'Syne,sans-serif',flexShrink:0,display:'flex',alignItems:'center',gap:6,boxShadow:'0 2px 8px rgba(22,163,74,.3)'}}>
                  {copied?'✓ Copied':'📤 Share'}
                </button>
              </div>
            )}
          </div>

          {/* HOST NOTES */}
          {game.description&&<div className="card" style={{padding:'1rem'}}><p style={{fontWeight:700,fontSize:'.82rem',color:'#0f172a',marginBottom:6}}>📝 Notes from host</p><p style={{fontSize:'.82rem',color:'#475569',lineHeight:1.6}}>{game.description}</p></div>}

          {/* GEAR */}
          {(joined||isHost)&&(
            <div className="card" style={{padding:'1rem'}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:4}}>🎒 Gear coordination</p>
              <p style={{fontSize:'.75rem',color:'#94a3b8',marginBottom:12}}>Let teammates know what you are bringing.</p>
              {!editGear?(
                <button onClick={()=>setEditGear(true)} className="btn-ghost" style={{width:'100%',padding:'10px',borderRadius:12,fontSize:'.82rem',marginBottom:Object.keys(gearMap).length>0?8:0}}>{gearMap[user?.id]?`Edit: ${gearMap[user?.id]}`:'+ Add what you are bringing'}</button>
              ):(
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={myGear} onChange={e=>setMyGear(e.target.value)} placeholder="Soccer ball, cones..." onKeyDown={e=>e.key==='Enter'&&saveGear()} style={{flex:1,height:40,padding:'0 12px',borderRadius:10,border:'1.5px solid #16a34a',fontSize:'.82rem',fontFamily:'DM Sans,sans-serif'}}/>
                  <button onClick={saveGear} disabled={savingGear} className="btn-green" style={{padding:'0 14px',borderRadius:10,fontSize:'.82rem',display:'flex',alignItems:'center',gap:4}}>{savingGear?<Spin s={14}/>:'Save'}</button>
                  <button onClick={()=>setEditGear(false)} style={{padding:'0 10px',borderRadius:10,border:'1.5px solid #e2e8f0',background:'white',cursor:'pointer',color:'#94a3b8',fontSize:'.85rem'}}>✕</button>
                </div>
              )}
              {Object.keys(gearMap).filter(pid=>pid!==user?.id&&gearMap[pid]).map(pid=>{const p=players.find(pl=>pl.id===pid);return p?<div key={pid} style={{padding:'6px 10px',background:'#f8fafc',borderRadius:10,marginBottom:6,display:'flex',gap:8,alignItems:'center'}}><Avatar user={p} size={24}/><p style={{fontSize:'.78rem',color:'#475569'}}><span style={{fontWeight:600}}>{p.full_name.split(' ')[0]}</span>: {gearMap[pid]}</p></div>:null;})}
            </div>
          )}

          {/* WHO IS GOING */}
          <div className="card" style={{padding:'1rem'}}>
            <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>{pIds.length===0?'No players yet':'Who is going'} ({pIds.length})</p>
            {loading&&<div style={{display:'flex',justifyContent:'center',padding:'1rem'}}><Spin c='#16a34a' s={22}/></div>}
            {!loading&&pIds.length===0&&<p style={{fontSize:'.8rem',color:'#94a3b8',textAlign:'center',padding:'1rem 0'}}>Join and be the first player listed here.</p>}
            {!loading&&players.map(p=><PlayerRow key={p.id} player={p} isHost={p.id===game.host_id} gear={gearMap[p.id]} user={user} friends={friends} onSendReq={pl=>{if(!sentReqs.includes(pl.id))sendFriendReq(pl);}} onMessage={pl=>setChatWith(pl)}/>)}
          </div>
        </div>
      </div>
      {showCal&&<CalSheet game={game} onClose={()=>setShowCal(false)}/>}
      {showEdit&&<EditGameSheet game={game} user={user} onDone={()=>{onUpdate&&onUpdate();}} onClose={()=>setShowEdit(false)}/>}
      {ageModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:70,display:'flex',alignItems:'center',justifyContent:'center',padding:'1.5rem'}}>
          <div style={{background:'white',borderRadius:20,padding:'1.5rem',width:'100%',maxWidth:340,textAlign:'center'}}>
            {ageModal==='block'&&(
              <>
                <p style={{fontSize:'2rem',marginBottom:10}}>🚫</p>
                <p className="syne" style={{fontWeight:800,fontSize:'1.05rem',color:'#0f172a',marginBottom:8}}>Age Requirement</p>
                <p style={{fontSize:'.82rem',color:'#64748b',marginBottom:'1.25rem',lineHeight:1.5}}>You must be at least 13 years old to join games on SportsMatch.</p>
                <button onClick={()=>setAgeModal(null)} className="btn-green" style={{width:'100%',padding:'12px',borderRadius:12,fontSize:'.9rem',fontFamily:'Syne,sans-serif',fontWeight:700}}>OK</button>
              </>
            )}
            {ageModal==='warn'&&(
              <>
                <p style={{fontSize:'2rem',marginBottom:10}}>⚠️</p>
                <p className="syne" style={{fontWeight:800,fontSize:'1.05rem',color:'#0f172a',marginBottom:8}}>Heads up</p>
                <p style={{fontSize:'.82rem',color:'#64748b',marginBottom:'1.25rem',lineHeight:1.5}}>This game may include players who are 18 or older. Are you sure you want to join?</p>
                <div style={{display:'grid',gap:8}}>
                  <button onClick={()=>{setAgeModal(null);pendingJoin&&pendingJoin();}} className="btn-green" style={{width:'100%',padding:'12px',borderRadius:12,fontSize:'.9rem',fontFamily:'Syne,sans-serif',fontWeight:700}}>Yes, join game</button>
                  <button onClick={()=>{setAgeModal(null);setPendingJoin(null);}} style={{width:'100%',padding:'12px',borderRadius:12,border:'1.5px solid #e2e8f0',background:'white',color:'#475569',fontWeight:600,fontSize:'.9rem',cursor:'pointer'}}>Cancel</button>
                </div>
              </>
            )}
            {ageModal==='consent'&&(
              <>
                <p style={{fontSize:'2rem',marginBottom:10}}>👨‍👩‍👧</p>
                <p className="syne" style={{fontWeight:800,fontSize:'1.05rem',color:'#0f172a',marginBottom:8}}>Parental Consent Required</p>
                <p style={{fontSize:'.82rem',color:'#64748b',marginBottom:'1rem',lineHeight:1.5}}>Players aged 13–15 need a parent or guardian's permission to join games. This game may also include players who are 18 or older.</p>
                <label style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:'1.25rem',cursor:'pointer',textAlign:'left'}}>
                  <input type="checkbox" checked={consentChecked} onChange={e=>setConsentChecked(e.target.checked)} style={{marginTop:3,accentColor:'#16a34a',flexShrink:0}}/>
                  <span style={{fontSize:'.8rem',color:'#0f172a',lineHeight:1.5}}>I have parental consent to join games on SportsMatch.</span>
                </label>
                <div style={{display:'grid',gap:8}}>
                  <button onClick={()=>{if(consentChecked){setAgeModal(null);pendingJoin&&pendingJoin();}}} disabled={!consentChecked} className="btn-green" style={{width:'100%',padding:'12px',borderRadius:12,fontSize:'.9rem',fontFamily:'Syne,sans-serif',fontWeight:700,opacity:consentChecked?1:.5}}>Join Game</button>
                  <button onClick={()=>{setAgeModal(null);setPendingJoin(null);setConsentChecked(false);}} style={{width:'100%',padding:'12px',borderRadius:12,border:'1.5px solid #e2e8f0',background:'white',color:'#475569',fontWeight:600,fontSize:'.9rem',cursor:'pointer'}}>Cancel</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
      {showChat&&(joined?(
        <GameChat game={game} user={user} onClose={()=>setShowChat(false)}/>
      ):(
        <div className="overlay" onClick={()=>setShowChat(false)}>
          <div className="sheet" onClick={e=>e.stopPropagation()} style={{textAlign:'center',padding:'2rem 1.5rem 2.5rem'}}>
            <Handle/>
            <div style={{fontSize:'2.5rem',marginBottom:12}}>💬</div>
            <p className="syne" style={{fontWeight:800,fontSize:'1.1rem',color:'#0f172a',marginBottom:8}}>{game.title}</p>
            <p style={{fontSize:'.82rem',color:'#94a3b8',marginBottom:'1.5rem',lineHeight:1.6}}>This is a group chat for players in this game.<br/>Join the game to chat.</p>
            <button onClick={()=>setShowChat(false)} className="btn-green" style={{padding:'12px 32px',borderRadius:12,fontSize:'.9rem',fontFamily:'Syne,sans-serif',fontWeight:700}}>Got it</button>
          </div>
        </div>
      ))}
      {chatWith&&<PrivateChat user={user} otherUser={chatWith} onClose={()=>setChatWith(null)}/>}
    </div>
  );
};

// ── GAME CARD ─────────────────────────────────────────────────
const GameCard=({game,user,onTap,idx=0})=>{
  const players=game.players||[];
  const isHost=game.host_id===user?.id;
  // Host counts as going even if not in players array (legacy data)
  const joined=players.includes(user?.id)||isHost;
  const effectivePlayers=isHost&&!players.includes(game.host_id)
    ?[...players,game.host_id]:players;
  const spots=game.max_players-effectivePlayers.length;
  const full=spots<=0;
  const pct=Math.round((effectivePlayers.length/game.max_players)*100);
  const color=SPORT_COLOR[game.sport]||'#16a34a';
  const sport=sportInfo(game.sport);
  const isPrivate=game.is_private;
  const showInFeed=game.show_in_feed;
  const canRequest=isPrivate&&showInFeed&&!joined&&!isHost;
  const [requested,setRequested]=React.useState(false);
  const [reqBusy,setReqBusy]=React.useState(false);
  const sendJoinRequest=async(e)=>{
    e.stopPropagation();
    if(requested||reqBusy)return;
    setReqBusy(true);
    const{data:ex}=await sb.from('join_requests').select('id').eq('game_id',game.id).eq('user_id',user.id).maybeSingle();
    if(!ex){
      await sb.from('join_requests').insert({game_id:game.id,user_id:user.id,user_name:user.full_name,status:'pending'});
      const{data:host}=await sb.from('users').select('email').eq('id',game.host_id).single();
      if(host?.email)await queueNotif('join_request',game,[host.email]);
    }
    setRequested(true);setReqBusy(false);
  };
  return(
    <div className="card up" style={{animationDelay:`${idx*55}ms`,overflow:'hidden',cursor:'pointer'}} onClick={onTap}>
      <div style={{height:4,background:`linear-gradient(90deg,${color},${color}44)`}}/>
      <div style={{padding:'1rem'}}>
        <div style={{display:'flex',gap:10,marginBottom:10,alignItems:'flex-start'}}>
          <div style={{width:42,height:42,borderRadius:12,background:`${color}12`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem',flexShrink:0}}>{sport.e}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:6}}>
              <p style={{fontWeight:700,fontSize:'.88rem',color:'#0f172a',lineHeight:1.3,flex:1,minWidth:0}}>{game.title}</p>
              <div style={{display:'flex',gap:4,flexShrink:0}}>
                {isPrivate&&<span style={{fontSize:'.6rem',fontWeight:700,background:'#fef3c7',color:'#92400e',padding:'2px 6px',borderRadius:99,border:'1px solid #fde68a'}}>🔒 Private</span>}
                {(joined||isHost)&&<span style={{fontSize:'.6rem',fontWeight:700,background:'#f0fdf4',color:'#16a34a',padding:'2px 7px',borderRadius:99,border:'1px solid #86efac'}}>{isHost?'Host':'Going'}</span>}
              </div>
            </div>
          </div>

  const onClose=()=>{setCreatedGame(null);setCreatedPublicGame(null);_onClose();};
  const [f,setF]=React.useState({title:'',sport:'',date:'',time:'',venue:'',address:'',city:'Santa Barbara',max_players:8,notes:'',is_private:false,show_in_feed:true});
  const [err,setErr]=React.useState('');
  const [busy,setBusy]=React.useState(false);
  const [createdGame,setCreatedGame]=React.useState(null);
  const [createdPublicGame,setCreatedPublicGame]=React.useState(null);
  const [copied,setCopied]=React.useState(false);
  const sheetRef=React.useRef(null);
  const set=(k,v)=>{setF(p=>({...p,[k]:v}));setErr('');};
  const today=localToday();
  React.useEffect(()=>{
    if((createdGame||createdPublicGame)&&sheetRef.current){
      sheetRef.current.scrollTop=0;
    }
  },[createdGame,createdPublicGame]);

  const submit=async()=>{
    if(!f.title.trim())return setErr('Give your game a title');
    if(!f.sport)return setErr('Pick a sport');
    if(!f.date)return setErr('Pick a date');
    if(!f.venue.trim())return setErr('Add a venue name');
    setBusy(true);
    const code=f.is_private?genCode():null;
    const{data:newGame,error}=await sb.from('games').insert({
      title:f.title.trim(),sport:f.sport,date:f.date,time:f.time,
      venue_name:f.venue.trim(),address:f.address.trim(),city:f.city.trim(),
      max_players:f.max_players,description:f.notes,
      players:[user.id],gear:{},host_id:user.id,host_name:user.full_name,status:'open',
      is_private:f.is_private,show_in_feed:f.is_private?f.show_in_feed:true,
      join_code:code,
    }).select().single();
    setBusy(false);
    if(error)return setErr('Failed to create game. Try again.');
    if(!f.is_private||f.show_in_feed){
      const{data:allUsers}=await sb.from('users').select('email').neq('id',user.id);
      const emails=(allUsers||[]).map(u=>u.email).filter(Boolean);
      await queueNotif('new_game',newGame,emails);
      // Email queued - edge function will process on next cron cycle

          </div>
        )}
