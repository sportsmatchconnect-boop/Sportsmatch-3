<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportsMatch — Find Your Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:#0f172a;-webkit-font-smoothing:antialiased}
    .syne{font-family:'Syne',sans-serif}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
    @keyframes slideup{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
    .up{animation:up .3s ease both}
    .fadein{animation:fadein .25s ease both}
    .spin{animation:spin .9s linear infinite}
    input:focus,textarea:focus{outline:none;border-color:#16a34a!important;box-shadow:0 0 0 3px rgba(22,163,74,.1)}
    .card{background:white;border-radius:18px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.04)}
    .btn-green{background:linear-gradient(135deg,#16a34a,#15803d);color:white;border:none;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
    .btn-green:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.3)}
    .btn-green:disabled{opacity:.5;cursor:not-allowed}
    .btn-ghost{background:white;border:1.5px solid #e2e8f0;color:#475569;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .18s}
    .btn-ghost:hover{border-color:#16a34a;color:#16a34a}
    .sport-btn{border:2px solid #e2e8f0;border-radius:12px;padding:.55rem .9rem;font-size:.8rem;font-weight:600;cursor:pointer;background:white;transition:all .15s;display:flex;align-items:center;gap:6px}
    .sport-btn:hover,.sport-btn.on{border-color:#16a34a;background:#f0fdf4;color:#15803d}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s ease}
    .sheet{background:white;border-radius:24px 24px 0 0;padding:1.75rem 1.5rem 2.5rem;width:100%;max-width:480px;animation:up .28s ease;max-height:92vh;overflow-y:auto}
    .fullsheet{background:#f8fafc;border-radius:24px 24px 0 0;width:100%;max-width:480px;animation:slideup .3s ease;height:92vh;overflow-y:auto}
    .nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:white;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-around;padding:.6rem 1rem .9rem;z-index:40}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:.3rem .6rem;border:none;background:none;transition:all .15s}
    .nav-label{font-size:.6rem;font-weight:600}
    .progress{height:5px;background:#e2e8f0;border-radius:99px;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;transition:width .4s ease}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .day-chip{border:2px solid #e2e8f0;border-radius:10px;padding:.45rem .7rem;font-size:.75rem;font-weight:600;cursor:pointer;background:white;transition:all .15s}
    .day-chip.on{border-color:#16a34a;background:#16a34a;color:white}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = 'https://vgwycjbmrswkagjddamp.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnd3ljamJtcnN3a2FnamRkYW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNDA5NTQsImV4cCI6MjA5MjkxNjk1NH0.GX3ff8a4wJameHWfjkn4VWeJL9bhJ-Hj9J3LP91tgqU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const S = {
  get: () => JSON.parse(localStorage.getItem('sm') || 'null'),
  set: u => localStorage.setItem('sm', JSON.stringify(u)),
  clear: () => localStorage.removeItem('sm'),
};

const SPORTS = [
  {id:'soccer',e:'⚽',l:'Soccer'},
  {id:'basketball',e:'🏀',l:'Basketball'},
  {id:'tennis',e:'🎾',l:'Tennis'},
  {id:'volleyball',e:'🏐',l:'Volleyball'},
  {id:'pickleball',e:'🏓',l:'Pickleball'},
  {id:'ultimate',e:'🥏',l:'Ultimate'},
  {id:'running',e:'🏃',l:'Running'},
  {id:'golf',e:'⛳',l:'Golf'},
];

const LEVELS = ['Beginner','Intermediate','Advanced','Pro'];
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

const SPORT_COLOR = {
  soccer:'#16a34a',basketball:'#f97316',tennis:'#f59e0b',
  volleyball:'#3b82f6',pickleball:'#ec4899',ultimate:'#8b5cf6',

};

const COLORS = ['#16a34a','#2563eb','#7c3aed','#ea580c','#db2777','#0891b2','#d97706'];

const sportInfo = id => SPORTS.find(s => s.id === id) || {e:'🏅', l: id};

const fmtDate = ds => {
  const d = new Date(ds + 'T00:00:00'), today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
};

// ── NOTIFICATIONS ─────────────────────────────────────────────
const queueNotification = async (type, game, emails) => {
  if (!emails || emails.length === 0) return;
  const sport = sportInfo(game.sport).l;
  const subjects = {
    new_game: `New ${sport} game posted — ${game.title}`,
    game_starting: `Starting soon: ${game.title}`,
    almost_full: `Almost full: ${game.title} — grab your spot`,
  };
  const bodies = {
    new_game: `A new ${sport} game was just posted on SportsMatch!\n\n${game.title}\nWhere: ${game.venue_name}${game.address ? ', ' + game.address : ''}\nWhen: ${game.date}${game.time ? ' at ' + game.time : ''}\nSpots: ${(game.players||[]).length}/${game.max_players} filled\n\nOpen SportsMatch to join.`,
    game_starting: `Your game starts soon!\n\n${game.title}\nWhere: ${game.venue_name}${game.address ? ', ' + game.address : ''}\nWhen: ${game.time || 'TBD today'}\n\nSee you on the field!`,
    almost_full: `${game.title} is almost full!\n\nOnly ${game.max_players - (game.players||[]).length} spot${game.max_players - (game.players||[]).length === 1 ? '' : 's'} left.\nWhere: ${game.venue_name}\nWhen: ${fmtDate(game.date)}${game.time ? ' at ' + game.time : ''}\n\nJoin now before it fills up.`,
  };
  try {
    await sb.from('notifications').insert({
      type,
      game_id: game.id,
      game_title: game.title,
      recipient_emails: emails,
      subject: subjects[type],
      body: bodies[type],
      sent: false,
      created_at: new Date().toISOString(),
    });
  } catch(e) {
    console.log('Notification queued:', type);
  }
};

// ── SHARED COMPONENTS ─────────────────────────────────────────
const Spin = ({c='white',s=18}) => (
  <div style={{width:s,height:s,borderRadius:'50%',border:`2.5px solid ${c}33`,borderTopColor:c,flexShrink:0}} className="spin"/>
);

const Avatar = ({user, size=38, ring=false}) => {
  const color = user?.avatar_color || '#16a34a';
  const initials = (user?.full_name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:`linear-gradient(135deg,${color},${color}cc)`,display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:700,fontSize:size>44?'.9rem':size>32?'.75rem':'.6rem',fontFamily:'Syne,sans-serif',flexShrink:0,boxShadow:ring?`0 0 0 3px white,0 0 0 5px ${color}55`:'none'}}>
      {initials}
    </div>
  );
};

const Inp = ({style={}, ...props}) => (
  <input style={{width:'100%',height:44,padding:'0 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',background:'white',fontFamily:'DM Sans,sans-serif',color:'#0f172a',...style}} {...props}/>
);

const Lbl = ({children}) => (
  <p style={{fontSize:'.68rem',fontWeight:600,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>{children}</p>
);

const ErrBox = ({msg}) => msg ? (
  <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:10,padding:'10px 14px',color:'#ef4444',fontSize:'.8rem',lineHeight:1.5}}>{msg}</div>
) : null;

const Handle = () => <div style={{width:36,height:4,background:'#e2e8f0',borderRadius:99,margin:'0 auto 1.25rem'}}/>;

const SPill = ({id}) => {
  const s = sportInfo(id);
  const c = SPORT_COLOR[id] || '#64748b';
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 8px',borderRadius:999,fontSize:'.68rem',fontWeight:600,background:`${c}12`,color:c,border:`1px solid ${c}22`}}>{s.e} {s.l}</span>;
};

// ── LANDING ───────────────────────────────────────────────────
const Landing = ({onAuth}) => (
  <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh'}}>

      <div style={{position:'absolute',inset:0,opacity:.04,backgroundImage:'radial-gradient(circle at 2px 2px,white 1px,transparent 0)',backgroundSize:'28px 28px'}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,padding:'1.5rem 1.25rem',display:'flex',alignItems:'center',justifyContent:'space-between',zIndex:10}}>
        <span className="syne" style={{color:'white',fontSize:'1.1rem',fontWeight:800}}>Sports<span style={{color:'#4ade80'}}>Match</span></span>
        <button onClick={()=>onAuth('login')} style={{padding:'8px 18px',borderRadius:99,background:'rgba(255,255,255,.15)',border:'1.5px solid rgba(255,255,255,.3)',color:'white',fontSize:'.8rem',fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>

        </button>

          <span style={{width:6,height:6,borderRadius:'50%',background:'#4ade80',boxShadow:'0 0 8px #4ade80'}}/>
          <span style={{color:'#4ade80',fontSize:'.72rem',fontWeight:600}}>Live in Santa Barbara, CA</span>

        <h1 className="syne" style={{fontSize:'2.6rem',fontWeight:800,color:'white',lineHeight:1.1,letterSpacing:'-1.5px',marginBottom:14}}>
          Get off<br/>the couch.<br/><span style={{color:'#4ade80'}}>Get on the field.</span>
        </h1>
        <p style={{color:'rgba(255,255,255,.6)',fontSize:'.88rem',lineHeight:1.7,marginBottom:'1.75rem',maxWidth:300}}>

          <div><p style={{fontWeight:700,fontSize:'.88rem',color:'#0f172a',marginBottom:3}}>{f.t}</p><p style={{fontSize:'.78rem',color:'#64748b',lineHeight:1.6}}>{f.d}</p></div>

      ))}
    </div>
    <div style={{margin:'0 1.25rem 2rem',background:'linear-gradient(135deg,#052e16,#14532d)',borderRadius:20,padding:'1.5rem'}}>

      <div style={{display:'flex',alignItems:'center',gap:10}}>

// ── AUTH ──────────────────────────────────────────────────────
const AuthSheet = ({mode:init, onAuth, onClose}) => {
  const [mode, setMode] = React.useState(init);
  const [f, setF] = React.useState({name:'',email:'',password:'',confirm:''});
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const upd = (k,v) => { setF(p=>({...p,[k]:v})); setErr(''); };

  const signup = async () => {
    if (!f.name.trim()) return setErr('Name is required');
    if (!f.email.includes('@')) return setErr('Enter a valid email');
    if (f.password.length < 6) return setErr('Password must be at least 6 characters');
    if (f.password !== f.confirm) return setErr('Passwords do not match');
    setBusy(true);
    try {
      const {data:ex} = await sb.from('users').select('id').eq('email',f.email.trim().toLowerCase()).maybeSingle();
      if (ex) { setErr('Email already in use.'); setBusy(false); return; }
      const color = COLORS[Math.floor(Math.random()*COLORS.length)];
      const {data,error} = await sb.from('users').insert({full_name:f.name.trim(),email:f.email.trim().toLowerCase(),password:f.password,avatar_color:color,onboarded:false}).select().single();
      if (error) throw error;
      const u = {...data}; delete u.password;
      S.set(u); onAuth(u);
    } catch(e) { setErr(e.message||'Something went wrong.'); }
    setBusy(false);
  };

  const login = async () => {
    if (!f.email.trim()||!f.password) return setErr('Fill in all fields');
    setBusy(true);
    try {
      const {data,error} = await sb.from('users').select('*').eq('email',f.email.trim().toLowerCase()).eq('password',f.password).maybeSingle();
      if (error||!data) { setErr('Wrong email or password.'); setBusy(false); return; }
      const u = {...data}; delete u.password;
      S.set(u); onAuth(u);
    } catch(e) { setErr('Something went wrong.'); }
    setBusy(false);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <Handle/>
        <p className="syne" style={{fontSize:'1.4rem',fontWeight:800,color:'#0f172a',marginBottom:4}}>{mode==='signup'?'Join SportsMatch':'Welcome back'}</p>
        <p style={{color:'#94a3b8',fontSize:'.82rem',marginBottom:'1.5rem'}}>{mode==='signup'?'Free forever. No credit card.':'Sign in to see and join games.'}</p>
        <div style={{display:'grid',gap:12}}>
          <ErrBox msg={err}/>
          {mode==='signup'&&<div><Lbl>Your Name</Lbl><Inp placeholder="Alex Johnson" value={f.name} onChange={e=>upd('name',e.target.value)}/></div>}
          <div><Lbl>Email</Lbl><Inp type="email" placeholder="you@example.com" value={f.email} onChange={e=>upd('email',e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='login'&&login()}/></div>
          <div><Lbl>Password</Lbl><Inp type="password" placeholder={mode==='signup'?'At least 6 characters':'Your password'} value={f.password} onChange={e=>upd('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&mode==='login'&&login()}/></div>
          {mode==='signup'&&<div><Lbl>Confirm Password</Lbl><Inp type="password" placeholder="Same again" value={f.confirm} onChange={e=>upd('confirm',e.target.value)} onKeyDown={e=>e.key==='Enter'&&signup()}/></div>}
          <button onClick={mode==='signup'?signup:login} disabled={busy} className="btn-green" style={{width:'100%',padding:'14px',borderRadius:13,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginTop:4}}>
            {busy?<Spin/>:mode==='signup'?'Create Account':'Sign In'}
          </button>
          <p style={{textAlign:'center',fontSize:'.78rem',color:'#94a3b8'}}>
            {mode==='signup'?'Have an account?':'New here?'}{' '}
            <button onClick={()=>{setMode(mode==='signup'?'login':'signup');setErr('');setF({name:'',email:'',password:'',confirm:''}); }} style={{background:'none',border:'none',color:'#16a34a',fontWeight:600,cursor:'pointer',fontSize:'.78rem'}}>
              {mode==='signup'?'Sign in':'Create account'}
            </button>
          </p>
        </div>
      </div>
    </div>
  );
};

// ── ONBOARDING ────────────────────────────────────────────────
const Onboarding = ({user, onComplete}) => {
  const [step, setStep] = React.useState(0);
  const [data, setData] = React.useState({age:'',city:'',sports:[],level:'',days:[],bio:''});
  const [saving, setSaving] = React.useState(false);
  const upd = (k,v) => setData(d=>({...d,[k]:v}));
  const tog = (k,v) => setData(d=>({...d,[k]:d[k].includes(v)?d[k].filter(x=>x!==v):[...d[k],v]}));

  const titles = ['Where are you based?','What do you play?','Your skill level','When are you free?','About you'];
  const subs = ['Helps us find games near you','Pick all sports you play','Be honest, it helps you find the right games','Match you with games that fit your schedule','Optional, you can edit this later'];

  const canNext = () => {
    if (step===0) return data.city.trim()&&data.age;
    if (step===1) return data.sports.length>0;
    if (step===2) return data.level;
    if (step===3) return data.days.length>0;
    return true;
  };

  const finish = async () => {
    setSaving(true);
    const updates = {age:data.age,city:data.city,sports:data.sports,skill_level:data.level,availability:data.days,bio:data.bio,onboarded:true};
    const {data:updated} = await sb.from('users').update(updates).eq('id',user.id).select().single();
    setSaving(false);
    const u = updated ? {...updated} : {...user,...updates};
    delete u.password;
    S.set(u); onComplete(u);
  };

  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'white',display:'flex',flexDirection:'column'}}>
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.5rem 1.75rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
          <p className="syne" style={{color:'white',fontSize:'1rem',fontWeight:700}}>Set up your profile</p>
          {step>0&&<button onClick={()=>setStep(s=>s-1)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'white',padding:'5px 12px',borderRadius:99,fontSize:'.75rem',cursor:'pointer'}}>Back</button>}
        </div>
        <div style={{display:'flex',gap:6,marginBottom:14}}>
          {titles.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:99,background:i<=step?'white':'rgba(255,255,255,.2)',transition:'background .3s'}}/>)}
        </div>
        <p style={{color:'rgba(255,255,255,.55)',fontSize:'.72rem',marginBottom:4}}>Step {step+1} of {titles.length}</p>
        <h2 className="syne" style={{color:'white',fontSize:'1.2rem',fontWeight:800,marginBottom:4}}>{titles[step]}</h2>
        <p style={{color:'rgba(255,255,255,.6)',fontSize:'.8rem'}}>{subs[step]}</p>
      </div>
      <div style={{flex:1,padding:'1.5rem',overflowY:'auto'}}>
        <div className="fadein" key={step}>
          {step===0&&(
            <div style={{display:'grid',gap:14}}>
              <div><Lbl>Your Age</Lbl><Inp type="number" placeholder="18" value={data.age} onChange={e=>upd('age',e.target.value)} style={{width:'45%'}}/></div>
              <div><Lbl>City</Lbl><Inp placeholder="Santa Barbara" value={data.city} onChange={e=>upd('city',e.target.value)}/></div>
              <div style={{background:'#f0fdf4',borderRadius:12,padding:'12px 14px',border:'1px solid #86efac'}}><p style={{fontSize:'.78rem',color:'#15803d',fontWeight:500}}>Your location helps us show games near you. We never share your exact address.</p></div>
            </div>
          )}
          {step===1&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {SPORTS.map(s=>(
                <button key={s.id} className={`sport-btn ${data.sports.includes(s.id)?'on':''}`} onClick={()=>tog('sports',s.id)}>
                  <span style={{fontSize:'1.1rem'}}>{s.e}</span><span>{s.l}</span>
                  {data.sports.includes(s.id)&&<span style={{marginLeft:'auto',color:'#16a34a'}}>v</span>}
                </button>
              ))}
            </div>
          )}
          {step===2&&(
            <div style={{display:'grid',gap:10}}>
              {LEVELS.map(l=>(
                <button key={l} onClick={()=>upd('level',l.toLowerCase())} style={{padding:'14px 16px',borderRadius:14,border:`2px solid ${data.level===l.toLowerCase()?'#16a34a':'#e2e8f0'}`,background:data.level===l.toLowerCase()?'#f0fdf4':'white',cursor:'pointer',textAlign:'left',transition:'all .15s'}}>
                  <p style={{fontWeight:700,fontSize:'.9rem',color:data.level===l.toLowerCase()?'#15803d':'#0f172a'}}>{l}</p>
                  <p style={{fontSize:'.75rem',color:'#94a3b8',marginTop:3}}>{l==='Beginner'?'Just starting out or play casually':l==='Intermediate'?'Know the rules, play regularly':l==='Advanced'?'Competitive league or varsity level':'Former or current competitive athlete'}</p>
                </button>
              ))}
            </div>
          )}
          {step===3&&(
            <div>
              <p style={{fontSize:'.78rem',color:'#64748b',marginBottom:12}}>Pick the days you are usually free:</p>
              <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{DAYS.map(d=><button key={d} className={`day-chip ${data.days.includes(d)?'on':''}`} onClick={()=>tog('days',d)}>{d}</button>)}</div>
            </div>
          )}
          {step===4&&(
            <div style={{display:'grid',gap:14}}>
              <div>
                <Lbl>Short Bio (optional)</Lbl>
                <textarea value={data.bio} onChange={e=>upd('bio',e.target.value)} placeholder="Competitive soccer player, love pickup basketball on weekends..." rows={4} style={{width:'100%',padding:'12px 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',resize:'none',fontFamily:'DM Sans,sans-serif',lineHeight:1.6}}/>
              </div>
              <div style={{background:'#f8fafc',borderRadius:14,padding:'1rem',border:'1px solid #e2e8f0'}}>
                <p style={{fontWeight:700,fontSize:'.82rem',color:'#0f172a',marginBottom:10}}>Your profile summary</p>
                {[{l:'Location',v:data.city},{l:'Sports',v:data.sports.map(s=>sportInfo(s).l).join(', ')},{l:'Level',v:data.level},{l:'Days',v:data.days.join(', ')}].map(r=>(
                  <div key={r.l} style={{display:'flex',gap:8,padding:'6px 0',borderBottom:'1px solid #f1f5f9',fontSize:'.78rem'}}>
                    <span style={{color:'#94a3b8',width:70,flexShrink:0}}>{r.l}</span>
                    <span style={{color:'#0f172a',fontWeight:500}}>{r.v||'Not set'}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
      <div style={{padding:'1rem 1.5rem 2rem',borderTop:'1px solid #f1f5f9',background:'white'}}>
        <button onClick={step<titles.length-1?()=>setStep(s=>s+1):finish} disabled={!canNext()||saving} className="btn-green" style={{width:'100%',padding:'15px',borderRadius:14,fontSize:'1rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,opacity:!canNext()||saving?.5:1}}>
          {saving?<><Spin/>Saving...</>:step===titles.length-1?'Enter App':'Continue'}
        </button>
        {step===titles.length-1&&<button onClick={finish} style={{width:'100%',marginTop:8,padding:'8px',border:'none',background:'none',color:'#94a3b8',cursor:'pointer',fontSize:'.75rem'}}>Skip for now</button>}
      </div>
    </div>
  );
};

// ── GAME DETAIL ───────────────────────────────────────────────
const GameDetail = ({game, user, onClose, onUpdate}) => {
  const [players, setPlayers] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [busy, setBusy] = React.useState(false);
  const [myGear, setMyGear] = React.useState('');
  const [editGear, setEditGear] = React.useState(false);
  const [savingGear, setSavingGear] = React.useState(false);

  const pIds = game.players || [];
  const joined = pIds.includes(user?.id);
  const isHost = game.host_id === user?.id;
  const spots = game.max_players - pIds.length;
  const full = spots <= 0;
  const pct = Math.round((pIds.length/game.max_players)*100);
  const color = SPORT_COLOR[game.sport]||'#16a34a';
  const sport = sportInfo(game.sport);
  const gearMap = game.gear || {};

  React.useEffect(()=>{
    const load = async () => {
      if (pIds.length===0){setLoading(false);return;}
      const {data} = await sb.from('users').select('id,full_name,avatar_color,city,bio,sports,skill_level').in('id',pIds);
      setPlayers(data||[]);
      if (gearMap[user?.id]) setMyGear(gearMap[user?.id]);
      setLoading(false);
    };
    load();
  },[game.id]);

  const toggleJoin = async () => {
    if (!user||isHost||busy||(full&&!joined)) return;
    setBusy(true);
    const np = joined ? pIds.filter(p=>p!==user.id) : [...pIds,user.id];
    const newGear = {...gearMap};
    if (joined) delete newGear[user.id];
    await sb.from('games').update({players:np,gear:newGear}).eq('id',game.id);
    if (!joined) {
      const threshold = Math.ceil(game.max_players*0.8);
      if (np.length===threshold) {
        const {data:us} = await sb.from('users').select('email').in('id',np);
        await queueNotification('almost_full',{...game,players:np},(us||[]).map(u=>u.email).filter(Boolean));
      }
    }
    onUpdate&&onUpdate();
    setBusy(false);
    onClose();
  };

  const saveGear = async () => {
    if (!myGear.trim()) return;
    setSavingGear(true);
    const ng = {...gearMap,[user.id]:myGear.trim()};
    await sb.from('games').update({gear:ng}).eq('id',game.id);
    setSavingGear(false);
    setEditGear(false);
    onUpdate&&onUpdate();
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="fullsheet" onClick={e=>e.stopPropagation()}>
        <div style={{background:`linear-gradient(155deg,${color}dd,${color}88)`,padding:'1.5rem 1.25rem 1.75rem',position:'relative'}}>
          <button onClick={onClose} style={{position:'absolute',top:16,right:16,width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.2)',border:'none',cursor:'pointer',color:'white',fontSize:'1rem',display:'flex',alignItems:'center',justifyContent:'center'}}>x</button>
          <div style={{width:52,height:52,borderRadius:16,background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.75rem',marginBottom:12}}>{sport.e}</div>
          <h2 className="syne" style={{color:'white',fontSize:'1.3rem',fontWeight:800,marginBottom:6,lineHeight:1.2}}>{game.title}</h2>
          <p style={{color:'rgba(255,255,255,.85)',fontSize:'.82rem',marginBottom:3}}>📍 {game.venue_name}</p>
          {game.address&&<p style={{color:'rgba(255,255,255,.7)',fontSize:'.78rem',marginBottom:3}}>{game.address}</p>}
          {game.city&&<p style={{color:'rgba(255,255,255,.7)',fontSize:'.78rem',marginBottom:3}}>📌 {game.city}</p>}
          <p style={{color:'rgba(255,255,255,.85)',fontSize:'.82rem'}}>🗓 {fmtDate(game.date)}{game.time?` at ${game.time}`:''}</p>
        </div>
        <div style={{padding:'1.25rem',display:'grid',gap:14}}>
          <div className="card" style={{padding:'1rem'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a'}}>👥 {pIds.length} of {game.max_players} spots filled</p>
              <p style={{fontSize:'.75rem',color:full?'#ef4444':'#16a34a',fontWeight:600}}>{full?'Full':`${spots} left`}</p>
            </div>
            <div className="progress"><div className="progress-fill" style={{width:`${pct}%`,background:full?'#f87171':`linear-gradient(90deg,${color},${color}99)`}}/></div>
          </div>
          {game.description&&(
            <div className="card" style={{padding:'1rem'}}>
              <p style={{fontWeight:700,fontSize:'.82rem',color:'#0f172a',marginBottom:6}}>📝 Notes from host</p>
              <p style={{fontSize:'.82rem',color:'#475569',lineHeight:1.6}}>{game.description}</p>
            </div>
          )}
          {(joined||isHost)&&(
            <div className="card" style={{padding:'1rem'}}>
              <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:4}}>🎒 Gear coordination</p>
              <p style={{fontSize:'.75rem',color:'#94a3b8',marginBottom:12}}>Let teammates know what you are bringing.</p>
              {!editGear?(
                <button onClick={()=>setEditGear(true)} className="btn-ghost" style={{width:'100%',padding:'10px',borderRadius:12,fontSize:'.82rem',marginBottom:8}}>
                  {gearMap[user?.id]?`Edit: ${gearMap[user?.id]}`:'Add what you are bringing'}
                </button>
              ):(
                <div style={{display:'flex',gap:8,marginBottom:8}}>
                  <input value={myGear} onChange={e=>setMyGear(e.target.value)} placeholder="Soccer ball, cones..." onKeyDown={e=>e.key==='Enter'&&saveGear()} style={{flex:1,height:40,padding:'0 12px',borderRadius:10,border:'1.5px solid #16a34a',fontSize:'.82rem',fontFamily:'DM Sans,sans-serif'}}/>
                  <button onClick={saveGear} disabled={savingGear} className="btn-green" style={{padding:'0 14px',borderRadius:10,fontSize:'.82rem',display:'flex',alignItems:'center',gap:4}}>{savingGear?<Spin s={14}/>:'Save'}</button>
                  <button onClick={()=>setEditGear(false)} style={{padding:'0 10px',borderRadius:10,border:'1.5px solid #e2e8f0',background:'white',cursor:'pointer',fontSize:'.8rem',color:'#94a3b8'}}>x</button>
                </div>
              )}
              {Object.keys(gearMap).filter(pid=>pid!==user?.id&&gearMap[pid]).map(pid=>{
                const p = players.find(pl=>pl.id===pid);
                return p?(
                  <div key={pid} style={{padding:'6px 10px',background:'#f8fafc',borderRadius:10,marginBottom:6,display:'flex',gap:8,alignItems:'center'}}>
                    <Avatar user={p} size={24}/>
                    <p style={{fontSize:'.78rem',color:'#475569'}}><span style={{fontWeight:600}}>{p.full_name.split(' ')[0]}</span>: {gearMap[pid]}</p>
                  </div>
                ):null;
              })}
              {Object.keys(gearMap).length===0&&!editGear&&<p style={{fontSize:'.75rem',color:'#94a3b8',textAlign:'center',padding:'4px 0'}}>Nobody has added gear yet.</p>}
            </div>
          )}
          <div className="card" style={{padding:'1rem'}}>
            <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>{pIds.length===0?'No players yet, be the first!':`Who is going (${pIds.length})`}</p>
            {loading&&<div style={{display:'flex',justifyContent:'center',padding:'1rem'}}><Spin c='#16a34a' s={22}/></div>}
            {!loading&&pIds.length===0&&<p style={{fontSize:'.8rem',color:'#94a3b8',textAlign:'center',padding:'1rem 0'}}>Join and be the first player listed here.</p>}
            {!loading&&players.map(p=><PlayerRow key={p.id} player={p} isHost={p.id===game.host_id} gear={gearMap[p.id]}/>)}
          </div>
          {!isHost?(
            <button onClick={toggleJoin} disabled={busy||(full&&!joined)} className="btn-green" style={{width:'100%',padding:'15px',borderRadius:14,fontSize:'1rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8,background:joined?'white':full?'#f1f5f9':`linear-gradient(135deg,${color},${color}cc)`,color:joined?'#ef4444':full?'#94a3b8':'white',border:joined?'1.5px solid #fecaca':'none'}}>
              {busy?<Spin c={joined?'#ef4444':'white'}/>:joined?'Leave Game':'Join Game'}
            </button>
          ):(
            <div style={{padding:'14px',borderRadius:14,background:'#f0fdf4',border:'1.5px solid #86efac',textAlign:'center'}}><p style={{fontWeight:600,fontSize:'.88rem',color:'#16a34a'}}>You created this game</p></div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── CREATE GAME ───────────────────────────────────────────────
const CreateSheet = ({user, onDone, onClose}) => {
  const [f, setF] = React.useState({title:'',sport:'',date:'',time:'',venue:'',address:'',city:'Santa Barbara',max_players:8,notes:''});
  const [err, setErr] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const set = (k,v) => { setF(p=>({...p,[k]:v})); setErr(''); };
  const today = new Date().toISOString().split('T')[0];

  const submit = async () => {
    if (!f.title.trim()) return setErr('Give your game a title');
    if (!f.sport) return setErr('Pick a sport');
    if (!f.date) return setErr('Pick a date');
    if (!f.venue.trim()) return setErr('Add a venue name');
    setBusy(true);
    const {data:newGame,error} = await sb.from('games').insert({
      title:f.title.trim(),sport:f.sport,date:f.date,time:f.time,
      venue_name:f.venue.trim(),address:f.address.trim(),city:f.city.trim(),
      max_players:f.max_players,description:f.notes,
      players:[],gear:{},host_id:user.id,host_name:user.full_name,status:'open',
    }).select().single();
    setBusy(false);
    if (error) return setErr('Failed to create game. Try again.');
    const {data:allUsers} = await sb.from('users').select('email').neq('id',user.id);
    const emails = (allUsers||[]).map(u=>u.email).filter(Boolean);
    await queueNotification('new_game',newGame,emails);
    onDone&&onDone(); onClose();
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <Handle/>
        <p className="syne" style={{fontSize:'1.3rem',fontWeight:800,color:'#0f172a',marginBottom:'1.25rem'}}>Create a Game</p>
        <div style={{display:'grid',gap:14}}>
          <ErrBox msg={err}/>
          <div><Lbl>Game Title</Lbl><Inp placeholder="Sunday Soccer at Elings Park" value={f.title} onChange={e=>set('title',e.target.value)}/></div>
          <div>
            <Lbl>Sport</Lbl>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {SPORTS.map(s=>(
                <button key={s.id} className={`sport-btn ${f.sport===s.id?'on':''}`} onClick={()=>set('sport',s.id)}>
                  <span>{s.e}</span><span>{s.l}</span>{f.sport===s.id&&<span style={{marginLeft:'auto',color:'#16a34a'}}>v</span>}
                </button>
              ))}
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><Lbl>Date</Lbl><Inp type="date" min={today} value={f.date} onChange={e=>set('date',e.target.value)} style={{colorScheme:'light'}}/></div>
            <div><Lbl>Time</Lbl><Inp type="time" value={f.time} onChange={e=>set('time',e.target.value)} style={{colorScheme:'light'}}/></div>
          </div>
          <div><Lbl>Venue Name</Lbl><Inp placeholder="Elings Park" value={f.venue} onChange={e=>set('venue',e.target.value)}/></div>
          <div><Lbl>Exact Address</Lbl><Inp placeholder="1701 Las Positas Rd, Santa Barbara, CA" value={f.address} onChange={e=>set('address',e.target.value)}/></div>
          <div><Lbl>City</Lbl><Inp placeholder="Santa Barbara" value={f.city} onChange={e=>set('city',e.target.value)}/></div>
          <div>
            <Lbl>Max Players: <span style={{color:'#16a34a',fontWeight:700}}>{f.max_players}</span></Lbl>
            <input type="range" min="2" max="30" value={f.max_players} onChange={e=>set('max_players',parseInt(e.target.value))} style={{width:'100%',accentColor:'#16a34a',marginTop:6}}/>
          </div>
          <div><Lbl>Notes for players (optional)</Lbl>
            <textarea value={f.notes} onChange={e=>set('notes',e.target.value)} placeholder="Bring water, all levels welcome, meet at the south field..." rows={2} style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',resize:'none',fontFamily:'DM Sans,sans-serif'}}/>
          </div>
          <button onClick={submit} disabled={busy} className="btn-green" style={{width:'100%',padding:'14px',borderRadius:13,fontSize:'.95rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
            {busy?<><Spin/>Creating...</>:'Create Game'}
          </button>
        </div>
      </div>
    </div>
  );
};

// ── PROFILE ───────────────────────────────────────────────────
const ProfilePage = ({user, setUser, onLogout}) => {
  const [editing, setEditing] = React.useState(false);
  const [myGames, setMyGames] = React.useState([]);
  const [joinedGames, setJoinedGames] = React.useState([]);
  const [form, setForm] = React.useState({bio:user.bio||'',city:user.city||'',age:user.age||''});
  const [saving, setSaving] = React.useState(false);

  React.useEffect(()=>{
    sb.from('games').select('*').eq('host_id',user.id).order('date',{ascending:true}).then(({data})=>setMyGames(data||[]));
    sb.from('games').select('*').contains('players',[user.id]).order('date',{ascending:true}).then(({data})=>setJoinedGames(data||[]));
  },[]);

  const save = async () => {
    setSaving(true);
    const {data} = await sb.from('users').update(form).eq('id',user.id).select().single();
    setSaving(false);
    if (data){const u={...data};delete u.password;setUser(u);S.set(u);}
    setEditing(false);
  };

  return (
    <div style={{minHeight:'100vh',background:'#f8fafc',paddingBottom:90}}>
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.25rem 2.5rem'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1.5rem'}}>
          <h1 className="syne" style={{color:'white',fontSize:'1.4rem',fontWeight:800}}>Profile</h1>
          <button onClick={onLogout} style={{padding:'6px 14px',borderRadius:99,background:'rgba(239,68,68,.2)',border:'1px solid rgba(239,68,68,.35)',color:'#fca5a5',fontSize:'.75rem',fontWeight:600,cursor:'pointer'}}>Sign out</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <Avatar user={user} size={64} ring/>
          <div>
            <h2 className="syne" style={{color:'white',fontSize:'1.1rem',fontWeight:800,marginBottom:4}}>{user.full_name}</h2>
            {user.city&&<p style={{color:'rgba(255,255,255,.65)',fontSize:'.78rem',marginBottom:4}}>📍 {user.city}</p>}
            {user.sports?.length>0&&<div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{user.sports.slice(0,3).map(s=><SPill key={s} id={s}/>)}</div>}
          </div>
        </div>
      </div>
      <div style={{padding:'1rem 1.25rem',display:'grid',gap:14,marginTop:-16}}>
        <div className="card" style={{padding:'1rem'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a'}}>About</p>
            <button onClick={()=>setEditing(!editing)} className="btn-ghost" style={{padding:'5px 12px',borderRadius:99,fontSize:'.75rem'}}>{editing?'Cancel':'Edit'}</button>
          </div>
          {!editing?(
            <>
              {user.bio?<p style={{fontSize:'.82rem',color:'#475569',lineHeight:1.6,marginBottom:10}}>{user.bio}</p>:<p style={{fontSize:'.82rem',color:'#94a3b8',marginBottom:10}}>No bio yet. Tap Edit to add one.</p>}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {[{l:'Age',v:user.age},{l:'Level',v:user.skill_level},{l:'Available',v:(user.availability||[]).slice(0,3).join(', ')}].filter(r=>r.v).map(r=>(
                  <div key={r.l} style={{background:'#f8fafc',borderRadius:10,padding:'8px 10px'}}>
                    <p style={{fontSize:'.62rem',color:'#94a3b8',fontWeight:600,textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>{r.l}</p>
                    <p style={{fontSize:'.8rem',fontWeight:600,color:'#0f172a'}}>{r.v}</p>
                  </div>
                ))}
              </div>
            </>
          ):(
            <div style={{display:'grid',gap:12}}>
              <div><Lbl>Bio</Lbl><textarea value={form.bio} onChange={e=>setForm(f=>({...f,bio:e.target.value}))} rows={3} style={{width:'100%',padding:'10px 14px',borderRadius:12,border:'1.5px solid #e2e8f0',fontSize:'.875rem',resize:'none',fontFamily:'DM Sans,sans-serif'}}/></div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div><Lbl>City</Lbl><Inp value={form.city} onChange={e=>setForm(f=>({...f,city:e.target.value}))} placeholder="Santa Barbara"/></div>
                <div><Lbl>Age</Lbl><Inp type="number" value={form.age} onChange={e=>setForm(f=>({...f,age:e.target.value}))} placeholder="18"/></div>
              </div>
              <button onClick={save} disabled={saving} className="btn-green" style={{padding:'11px',borderRadius:12,fontSize:'.88rem',fontFamily:'Syne,sans-serif',fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
                {saving?<><Spin/>Saving...</>:'Save Changes'}
              </button>
            </div>
          )}
        </div>
        <div className="card" style={{padding:'1rem'}}>
          <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>Stats</p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {[{l:'Created',v:myGames.length,c:'#16a34a'},{l:'Joined',v:joinedGames.length,c:'#2563eb'},{l:'Total',v:myGames.length+joinedGames.length,c:'#7c3aed'}].map(s=>(
              <div key={s.l} style={{background:'#f8fafc',borderRadius:12,padding:'12px 8px',textAlign:'center'}}>
                <p className="syne" style={{fontSize:'1.5rem',fontWeight:800,color:s.c}}>{s.v}</p>
                <p style={{fontSize:'.62rem',color:'#94a3b8',marginTop:3}}>{s.l}</p>
              </div>
            ))}
          </div>
        </div>
        {myGames.length>0&&(
          <div className="card" style={{padding:'1rem'}}>
            <p style={{fontWeight:700,fontSize:'.85rem',color:'#0f172a',marginBottom:12}}>Games You Created</p>
            {myGames.slice(0,3).map(g=>(
              <div key={g.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #f8fafc'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:'1.1rem'}}>{sportInfo(g.sport).e}</span>
                  <div><p style={{fontWeight:600,fontSize:'.82rem',color:'#0f172a'}}>{g.title}</p><p style={{fontSize:'.7rem',color:'#94a3b8'}}>{fmtDate(g.date)}</p></div>
                </div>
                <span style={{fontSize:'.72rem',color:'#16a34a',fontWeight:600}}>{(g.players||[]).length}/{g.max_players}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

// ── FEED ──────────────────────────────────────────────────────
const Feed = ({user, setUser, onLogout}) => {
  const [games, setGames] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [sport, setSport] = React.useState('all');
  const [creating, setCreating] = React.useState(false);
  const [detail, setDetail] = React.useState(null);
  const [tab, setTab] = React.useState('feed');
  const today = new Date().toISOString().split('T')[0];

  const load = async () => {
    const {data} = await sb.from('games').select('*').gte('date',today).order('date',{ascending:true});
    setGames(data||[]);
    setLoading(false);
  };

  React.useEffect(()=>{load();},[]);

  const filtered = sport==='all'?games:games.filter(g=>g.sport===sport);
  const myCount = games.filter(g=>(g.players||[]).includes(user.id)||g.host_id===user.id).length;

  const NavBar = ({active}) => (
    <div className="nav">
      <button className="nav-item" onClick={()=>setTab('feed')}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active==='feed'?'#16a34a':'#94a3b8'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span className="nav-label" style={{color:active==='feed'?'#16a34a':'#94a3b8'}}>Games</span>
      </button>
      <button onClick={()=>setCreating(true)} style={{width:54,height:54,borderRadius:16,background:'linear-gradient(135deg,#16a34a,#15803d)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',marginTop:-16,boxShadow:'0 4px 16px rgba(22,163,74,.4)'}}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button className="nav-item" onClick={()=>setTab('profile')}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active==='profile'?'#16a34a':'#94a3b8'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span className="nav-label" style={{color:active==='profile'?'#16a34a':'#94a3b8'}}>Profile</span>
      </button>
    </div>
  );

  if (tab==='profile') return (
    <div style={{maxWidth:480,margin:'0 auto'}}>
      <ProfilePage user={user} setUser={setUser} onLogout={onLogout}/>
      <NavBar active="profile"/>
      {creating&&<CreateSheet user={user} onDone={load} onClose={()=>setCreating(false)}/>}
    </div>
  );

  return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'#f8fafc',paddingBottom:90}}>
      <div style={{background:'linear-gradient(155deg,#052e16,#16a34a)',padding:'3rem 1.25rem 1.5rem'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem'}}>
          <div>
            <p style={{color:'rgba(255,255,255,.55)',fontSize:'.75rem',fontWeight:500}}>{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p>
            <h1 className="syne" style={{color:'white',fontSize:'1.4rem',fontWeight:800,marginTop:2}}>Hey, {user.full_name.split(' ')[0]} 👋</h1>
          </div>
          <button onClick={()=>setTab('profile')} style={{background:'none',border:'none',cursor:'pointer'}}><Avatar user={user} size={42} ring/></button>
        </div>
        <div style={{background:'rgba(255,255,255,.08)',borderRadius:14,padding:'11px 16px',display:'flex',gap:0,border:'1px solid rgba(255,255,255,.1)'}}>
          {[{v:games.length,l:'Games up'},{v:myCount,l:'You are in'},{v:games.reduce((a,g)=>a+(g.players||[]).length,0),l:'Players'}].map((s,i)=>(
            <React.Fragment key={s.l}>
              {i>0&&<div style={{width:1,background:'rgba(255,255,255,.12)',margin:'0 16px'}}/>}
              <div style={{textAlign:'center',flex:1}}>
                <p className="syne" style={{color:'white',fontSize:'1.15rem',fontWeight:800}}>{s.v}</p>
                <p style={{color:'rgba(255,255,255,.5)',fontSize:'.62rem',fontWeight:500,marginTop:1}}>{s.l}</p>
              </div>
            </React.Fragment>
          ))}
        </div>
      </div>
      <div style={{padding:'1rem 1.25rem .5rem',overflowX:'auto'}} className="scrollbar-hide">
        <div style={{display:'flex',gap:8,width:'max-content'}}>
          {['all',...SPORTS.map(s=>s.id)].map(s=>{
            const info=SPORTS.find(x=>x.id===s);
            const active=sport===s;
            return <button key={s} onClick={()=>setSport(s)} style={{padding:'6px 14px',borderRadius:99,fontSize:'.75rem',fontWeight:600,border:'none',cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s',background:active?'#16a34a':'white',color:active?'white':'#475569',boxShadow:active?'0 2px 8px rgba(22,163,74,.3)':'0 1px 3px rgba(0,0,0,.06)'}}>{s==='all'?'All Sports':`${info.e} ${info.l}`}</button>;
          })}
        </div>
      </div>
      <div style={{padding:'.75rem 1.25rem',display:'grid',gap:12}}>
        {loading&&<div style={{display:'flex',justifyContent:'center',padding:'3rem'}}><Spin c='#16a34a' s={28}/></div>}
        {!loading&&filtered.length===0&&(
          <div className="card" style={{padding:'2.5rem',textAlign:'center'}}>
            <p style={{fontSize:'2.5rem',marginBottom:10}}>🏟️</p>
            <p className="syne" style={{fontWeight:700,color:'#0f172a',marginBottom:6}}>No games yet</p>
            <p style={{color:'#94a3b8',fontSize:'.85rem',marginBottom:'1.25rem'}}>Be the first to create one in Santa Barbara.</p>
            <button onClick={()=>setCreating(true)} className="btn-green" style={{padding:'10px 24px',borderRadius:12,fontSize:'.85rem',fontFamily:'Syne,sans-serif',fontWeight:700}}>Create a Game</button>
          </div>
        )}
        {!loading&&filtered.map((g,i)=><GameCard key={g.id} game={g} user={user} onTap={()=>setDetail(g)} idx={i}/>)}
      </div>
      <NavBar active="feed"/>
      {creating&&<CreateSheet user={user} onDone={load} onClose={()=>setCreating(false)}/>}
      {detail&&<GameDetail game={detail} user={user} onClose={()=>{setDetail(null);load();}} onUpdate={load}/>}
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────
const App = () => {
  const [user, setUser] = React.useState(()=>S.get());
  const [authMode, setAuthMode] = React.useState(null);
  const handleAuth = u => { setUser(u); setAuthMode(null); };
  const handleLogout = () => { S.clear(); setUser(null); };
  const updateUser = u => { setUser(u); S.set(u); };

  if (!user) return (
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
      <Landing onAuth={mode=>setAuthMode(mode)}/>
      {authMode&&<AuthSheet mode={authMode} onAuth={handleAuth} onClose={()=>setAuthMode(null)}/>}
    </div>
  );

  if (!user.onboarded) return <Onboarding user={user} onComplete={u=>updateUser({...u,onboarded:true})}/>;

  return <Feed user={user} setUser={updateUser} onLogout={handleLogout}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
